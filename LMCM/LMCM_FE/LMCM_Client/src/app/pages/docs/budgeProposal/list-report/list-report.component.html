<p-card>
  <!-- Page Header -->
  <div class="flex justify-between items-center">
    <h2 class="text-xl font-bold text-orange-500">Danh sách Tờ Trình</h2>
    <p-button label="Thêm mới" (click)="openAddDialog()"></p-button>
  </div>

  <!-- Search -->
  <div class="mt-3">
    <p-inputGroup class="w-full">
      <p-button label="Tìm kiếm"></p-button>
      <input [(ngModel)]="searchKey" (ngModelChange)="onSearchChange($event)" pInputText placeholder="Từ khóa" />
    </p-inputGroup>
  </div>

  <!-- Table -->
  <div class="mt-4">
    <p-table [value]="reports" [rows]="5" [paginator]="true" class="w-full"
      currentPageReportTemplate="Hiện {first} tới {last} của {totalRecords} tờ trình" [showCurrentPageReport]="true"
      [rowsPerPageOptions]="[5, 10, 20]">
      <!-- Table Header -->
      <ng-template pTemplate="header">
        <tr class="bg-gray-100 text-gray-700">
          <th class="p-2 text-left">Người tạo</th>
          <th class="p-2 text-left">Tiêu đề</th>
          <th class="p-2 text-center">Ngày</th>
          <th class="p-2 text-center" style="display: flex; justify-content: center;">Hành động</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-report>
        <tr class="border-b border-gray-200">
          <!-- Cột Người tạo -->
          <td class="p-2">{{ report.author.email }}</td>

          <!-- Cột Tiêu đề (Giới hạn ký tự + tooltip) -->
          <td class="p-2 max-w-[200px] truncate" title="{{ report.title }}">
            {{ report.title | slice:0:30 }}{{ report.title.length > 30 ? '...' : '' }}
          </td>

          <!-- Cột Ngày -->
          <td class="p-2 text-center">{{ report.proposalDate | date: 'dd/MM/yyyy' }}</td>

          <!-- Cột Hành động -->
          <td class="p-2 flex justify-center gap-2">
            <p-button label="Chi tiết" outlined severity="info"
              (click)="openDetailDialog(report.proposalId)"></p-button>
            <p-button label="Sửa" outlined (click)="openAddDialog(report.proposalId)"></p-button>
            <p-button label="Xóa" outlined severity="danger"
              (click)="deleteBudgetProposal(report.proposalId)"></p-button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center">Không tìm thấy dữ liệu</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</p-card>

<app-report-create-edit [displayAddDialog]="displayAddDialog" [selectedReportId]="selectedReportId!"
  (closeDialogEvent)="handleCloseDialog(!isDetail)">
</app-report-create-edit>

<app-report-detail [proposalId]="proposalId!" [displayDetailDialog]="displayDetailDialog"
  (closeDialogEvent)="handleCloseDialog(isDetail)" [hidden]="!displayDetailDialog">
</app-report-detail>

<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>
