<p-dialog header="Chi tiết tờ trình" [(visible)]="displayDetailDialog" [modal]="true" [draggable]="false"
    [resizable]="false" class="custom-dialog" (onHide)="closeDialog()"
    [style]="{width: '600px', height: 'auto', 'max-width': '90vw', 'max-height': '80vh'}">
    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl" *ngIf="report">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                <div class="flex flex-col gap-2 md:col-span-2">
                    <label class="block font-semibold text-orange-500">Tiêu đề tờ trình</label>
                    <p class="truncate">{{ report.title }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Người tạo</label>
                    <p>{{ report.author.name }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Ngày</label>
                    <p class="whitespace-pre-line">{{ report.proposalDate | date: 'dd/MM/yyyy' }}</p>
                </div>

                <div class="flex flex-col gap-2 md:col-span-2">
                    <label class="block font-semibold text-orange-500">File đính kèm</label>
                    
                    <div *ngIf="report.url; else noFile" class="flex items-center gap-3">
                        <p-button icon="pi pi-file" label="Xem file đính kèm" (click)="viewFile(report.url)" outlined>
                        </p-button>
                        <p-button icon="pi pi-download" text (click)="downloadFile(report.downloadUrl)">
                        </p-button>
                    </div>
                    <ng-template #noFile>
                        <p class="text-gray-500 italic">Không có file đính kèm</p>
                    </ng-template>
                </div>
            </div>
        </section>
    </ng-template>
</p-dialog>
