<p-card class="p-4 shadow-lg rounded-lg">
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-orange-500">Danh sách chương trình giảng dạy</h2>
        <p-button label="Nhập" icon="pi pi-upload" class="p-button-warning"></p-button>
    </div>

    <div class="mt-3">
        <p-inputgroup class="w-full">
            <p-button label="Search" />
            <input [(ngModel)]="searchKey" (ngModelChange)="loadCurriculums()" pInputText placeholder="Keyword" />
        </p-inputgroup>
    </div>

    <div class="mt-4">
        <p-table [value]="curriculums" [rows]="pageSize" [paginator]="true" [totalRecords]="totalCount"
            (onPage)="loadCurriculums($event)" class="w-full">
            <ng-template pTemplate="header">
                <tr>
                    <th>Mã chương trình</th>
                    <th>Tên chương trình</th>
                    <th>Miêu tả</th>
                    <th>Quyết định số</th>
                    <th>Ngày phê duyệt</th>
                    <th>Hành động</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td>{{ item.curriculumCode }}</td>
                    <td>{{ item.name }}</td>
                    <td>{{ item.description }}</td>
                    <td>{{ item.decisionNo }}</td>
                    <td>{{ item.approvedDate | date:'dd/MM/yyyy' }}</td>
                    <td>
                        <p-button label="Xóa" class="p-button-text p-button-sm p-button-danger"
                            (click)="confirmDelete(i)"></p-button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <!-- Hộp thoại xác nhận xóa -->
    <p-confirmDialog></p-confirmDialog>
</p-card>
