<p-dialog header="Chi tiết chuyên gia" [(visible)]="displayDetailDialog" [modal]="true" [draggable]="false"
    [resizable]="false" class="custom-dialog" (onHide)="closeDialog()"
    [style]="{width: '600px', height: 'auto', 'max-width': '90vw', 'max-height': '80vh'}">
    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl" *ngIf="expert">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                <div class="flex flex-col gap-2 md:col-span-2">
                    <label class="block font-semibold text-orange-500">Tên chuyên gia</label>
                    <p class="truncate">{{ expert.contractorName }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Tên ngân hàng</label>
                    <p>{{ expert.bankName }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Số điện thoại</label>
                    <p>{{ expert.phoneNumber }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Mã số thuế</label>
                    <p>{{ expert.taxCode }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Email</label>
                    <p>{{ expert.email }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Mã nhân viên</label>
                    <p>{{ expert.employeeCode }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Số CMND/CCCD</label>
                    <p>{{ expert.idCardNumber }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Nơi cấp CMND/CCCD</label>
                    <p>{{ expert.idIssuedPlace }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Chức vụ</label>
                    <p>{{ expert.position }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Số tài khoản ngân hàng</label>
                    <p>{{ expert.bankAccountNumber }}</p>
                </div>

                <div class="flex flex-col gap-2 md:col-span-2">
                    <label class="block font-semibold text-orange-500">Địa chỉ</label>
                    <p>{{ expert.address }}</p>
                </div>
            </div>
        </section>
    </ng-template>
</p-dialog>
