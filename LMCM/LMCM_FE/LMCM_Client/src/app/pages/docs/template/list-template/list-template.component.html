<p-card>
   
    <div class="flex justify-between items-center mb-3">
        <h2 class="text-xl font-bold text-orange-500">Danh sách tài liệu</h2>
        <p-button label="Thêm mới" class="p-button-warning" (click)="openAddDialog()"></p-button>
    </div>
  
    <div class="mt-3">
        <p-inputGroup class="w-full">
            <p-button label="Tìm kiếm"></p-button>
            <input [(ngModel)]="searchKey" (ngModelChange)="onSearchChange($event)" pInputText placeholder="Tìm kiếm tài liệu..." />
        </p-inputGroup>
    </div>
  
    <div class="mt-4">
        <p-table [value]="templates" [paginator]="true" [rows]="10" class="w-full"
            currentPageReportTemplate="Hiển thị {first} đến {last} trong tổng số {totalRecords} bản ghi"
            [showCurrentPageReport]="true" [rowsPerPageOptions]="[10, 20, 50]">
            
            <ng-template pTemplate="header">
                <tr>
                    <th>Tên tài liệu</th>
                    <th>Loại tài liệu</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </ng-template>
  
            <ng-template pTemplate="body" let-template let-rowIndex="rowIndex">
                <tr>
                    <td>{{ template.templateName }}</td>
                    <td>{{ template.templateType }}</td>
                    <td>
                        <p-tag 
                            [value]="template.status" 
                            [severity]="template.status === 'Đang sử dụng' ? 'success' : 'warn'">
                        </p-tag>
                    </td>
                    
                    <td>
                        <p-button label="Chi tiết" class="p-button-sm" outlined (click)="openDetailDialog(template)"></p-button>
                        <p-button label="Sửa" class="p-button-sm mr-2" outlined (click)="openAddDialog(template.templateId)"></p-button>
                        <p-button label="Xóa" class="p-button-sm" outlined (click)="deleteContract(template.templateId)"></p-button>
                    </td>
                </tr>
            </ng-template>
  
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="4" class="text-center">Không có dữ liệu</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
  </p-card>
