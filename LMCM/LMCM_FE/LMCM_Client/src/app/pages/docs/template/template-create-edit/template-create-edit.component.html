<p-dialog 
    header="Chỉnh sửa tài liệu" 
    [(visible)]="displayAddDialog" 
    [modal]="true"
    [style]="{ width: '1000px', minHeight: '55vh' }" 
    [draggable]="false" 
    [resizable]="false" 
    class="custom-dialog">

    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl" *ngIf="template">
            <div style="width: 50%;" class="flex flex-wrap gap-4">
                <div class="flex-1 min-w-[250px] w-1/2">
                    <label class="block mb-2">Tên tài liệu</label>
                    <input type="text" class="w-full p-2 border rounded" [(ngModel)]="template.templateName" />
                </div>
            </div>
            <div style="width: 50%;" class="flex flex-wrap gap-4">
              <div class="flex-1 min-w-[250px] w-1/2">
                  <label class="block mb-2">Loại tài liệu</label>
                  <input type="text" class="w-full p-2 border rounded" [(ngModel)]="template.templateType" />
              </div>
          </div>
           <div style="width: 50%;" class="flex flex-wrap gap-4 mt-4">
                <div class="flex-1 min-w-[250px] w-1/2">
                    <label class="block mb-2">Trạng thái</label>
                    <p-dropdown [options]="statusList" [(ngModel)]="template.status" 
                    optionLabel="label" optionValue="value"></p-dropdown>
                
                </div>
            </div>
                  <!-- File đính kèm -->
        <div class="flex flex-col gap-2 mt-3">
            <label class="block font-semibold text-orange-500">File đính kèm</label>
            <!-- Upload File -->
            <p-fileupload (onSelect)="onFileSelect($event)" [showUploadButton]="false" [multiple]="false" accept=".pdf"
              maxFileSize="5000000" mode="advanced">
              <ng-template #empty>
                <div>Kéo thả file để đăng tải.</div>
              </ng-template>
              <ng-template #content>
                <ul *ngIf="uploadedFiles.length">
                  <li *ngFor="let file of uploadedFiles">{{ file.name }} - {{ file.size }} bytes</li>
                </ul>
              </ng-template>
            </p-fileupload>
  
            <!-- Nút tải file đính kèm -->
            <div *ngIf="file && selectedId" class="flex items-center gap-4">
              <p-button (click)="downloadFile(file)" outlined>
                <i class="pi pi-download"></i> Tải file đính kèm
              </p-button>
              <span class="text-gray-500 text-sm">(Chọn file mới nếu muốn thay đổi)</span>
            </div>
          </div>
           
           <div class="mt-4">
            <div style="margin-top: 10px; display: flex; align-items: center; gap: 5px; background-color: white; border: 1px solid #ff9249; color: #eb6e1b; padding: 8px 12px; border-radius: 6px; font-weight: 500; cursor: pointer; max-width: fit-content;">
                <i class="pi pi-plus" style="font-size: 14px;"></i> 
                <span>Thay đổi file PDF</span>
            </div>
        
            <p style="font-size: 12px; color: gray; margin-top: 5px;">Chỉ chấp nhận file PDF, dung lượng tối đa 5MB</p>
           </div>
       
            
        </section>
    </ng-template>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-4 p-2">
            <p-button label="Hủy" class="p-button-text" (click)="closeDialog()"></p-button>
            <p-button label="Lưu" class="p-button-warning" (click)="save()"></p-button>
        </div>
    </ng-template>
</p-dialog>
