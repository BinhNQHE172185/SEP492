<p-card>
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-orange-500">Lịch sử thay đổi học liệu</h2>
    </div>

    <div class="mt-3">
        <p-inputgroup class="w-full">
            <p-button label="Tìm kiếm" />
            <input [(ngModel)]="searchKey" (ngModelChange)="onSearchChange($event)" pInputText placeholder="Từ khóa" />
        </p-inputgroup>
    </div>
    <div class="mt-4">
        <p-table [value]="historyList" [rows]="pageSize" [paginator]="true" [totalRecords]="totalCount" [lazy]="true"
            (onPage)="loadHistory($event)"
            currentPageReportTemplate="Hiển thị {first} - {last} của {totalRecords} bản ghi"
            [showCurrentPageReport]="true" [rowsPerPageOptions]="[10, 20, 30]" class="w-full"
            *ngIf="historyList && historyList.length > 0; else noDataTemplate">
            <ng-template pTemplate="header">
                <tr>
                    <th>Mã môn</th>
                    <th>Tên người thay đổi</th>
                    <th>Loại thay đổi</th>
                    <th>Nội dung thay đổi</th>
                    <th>Ngày hoàn thành</th>
                    <th>Kỳ áp dụng</th>
                    <th style="display: flex; justify-content: center;">Trạng thái</th>
                    <th>Hoạt động</th>
                </tr>
            </ng-template>


            <ng-template pTemplate="body" let-item>
                <tr>
                    <td>{{ item.courseCode }}</td>
                    <td>{{ item.username }}</td>
                    <td>
                        <p-tag [value]="item.changeType ? 'Xây mới' : 'Điều chỉnh'"
                            [severity]="item.changeType ? 'success' : 'danger'">
                        </p-tag>
                    </td>
                    <td>{{ item.changeDescription }}</td>
                    <td>{{ item.completionDate | date: 'dd/MM/yyyy' }}</td>
                    <td>{{ item.startTerm }}</td>
                    <td>
                        <p-tag [value]="item.status === 1 ? 'Active' : 'Inactive'"
                            [severity]="item.status === 1 ? 'success' : 'danger'">
                        </p-tag>
                    </td>
                    <td>
                        <div class="flex gap-2">
                            <p-button icon="pi pi-eye" (onClick)="goToDetail(item.syllabusId)" outlined></p-button>
                            <p-button icon="pi pi-book" (onClick)="goToContractDetail(item.contractId)" outlined></p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <ng-template #noDataTemplate>
        <p class="text-center text-gray-500 mt-4">Không có dữ liệu.</p>
    </ng-template>
</p-card>

<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>
