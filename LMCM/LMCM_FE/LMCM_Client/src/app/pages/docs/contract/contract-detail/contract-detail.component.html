<p-dialog header="Chi tiết hợp đồng" [(visible)]="displayDetailDialog" [modal]="true" [draggable]="false"
    [resizable]="false" class="custom-dialog" (onHide)="closeDialog()"
    [style]="{width: '600px', height: 'auto', 'max-width': '90vw', 'max-height': '80vh'}">
    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl" *ngIf="contract">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                <div class="flex flex-col gap-2 md:col-span-2">
                    <label class="block font-semibold text-orange-500">Số hợp đồng</label>
                    <p class="truncate">{{ contract.title }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Người tạo hợp đồng</label>
                    <p>{{ contract.author.name }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Chuyên gia</label>
                    <p>{{ contract.contractor.contractorName }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Tờ trình</label>
                    <a (click)="goToProposalDetail(contract.proposal.proposalId)" class="text-blue-600 hover:underline cursor-pointer"><p>{{ contract.proposal.title }}</p></a>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Giá trị hợp đồng</label>
                    <p class="whitespace-pre-line">{{ contract.contractValue }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Ngày bắt đầu</label>
                    <p class="whitespace-pre-line">{{ contract.startDate | date: 'dd/MM/yyyy' }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Ngày kết thúc</label>
                    <p class="whitespace-pre-line">{{ contract.endDate | date: 'dd/MM/yyyy' }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">File đính kèm</label>

                    <div *ngIf="contract.url; else noFile" class="flex items-center gap-3">
                        <p-button icon="pi pi-file" label="Xem file đính kèm" (click)="viewFile(contract.url)" outlined>
                        </p-button>
                        <p-button icon="pi pi-download" text (click)="downloadFile(contract.downloadUrl)">
                        </p-button>
                    </div>

                    <ng-template #noFile>
                        <p class="text-gray-500 italic">Không có file đính kèm</p>
                    </ng-template>
                </div>
            </div>
        </section>
    </ng-template>
</p-dialog>

<p-toast></p-toast>
