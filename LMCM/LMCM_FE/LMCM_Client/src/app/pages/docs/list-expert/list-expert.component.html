<p-card>
    <!-- Page Header -->
    <div class="flex justify-between items-center">
      <h2 class="text-xl font-bold text-orange-500">Quản lý chuyên gia</h2>
      <p-button
        label="Thêm"
        class="p-button-warning"
        (click)="openAddDialog()"
      ></p-button>
    </div>
  
    <!-- Search -->
    <div class="mt-3">
      <p-inputGroup class="w-full">
        <p-button label="Tìm kiếm"></p-button>
        <input
          [(ngModel)]="searchKey"
          (ngModelChange)="onSearchChange()"
          pInputText
          placeholder="Tìm kiếm chuyên gia..."
        />
      </p-inputGroup>
    </div>
  
    <!-- Table -->
    <div class="mt-4">
      <p-table
        [value]="filteredExperts"
        [rows]="5"
        [paginator]="true"
        class="w-full"
        currentPageReportTemplate="Hiện {first} tới {last} của {totalRecords} chuyên gia"
        [showCurrentPageReport]="true"
        [rowsPerPageOptions]="[5, 10, 20]"
      >
        <!-- Table Header -->
        <ng-template pTemplate="header">
          <tr>
            <th>Chuyên Gia</th>
            <th>Email</th>
            <th>Hành Động</th>
          </tr>
        </ng-template>
  
        <!-- Table Body -->
        <ng-template pTemplate="body" let-expert let-rowIndex="rowIndex">
          <tr>
            <td>{{ expert.name }}</td>
            <td>{{ expert.email }}</td>
            <td>
              <p-button
                label="Chi tiết"
                class="p-button-sm"
                outlined
                (click)="openDetailDialog(expert)"
              ></p-button>
              <p-button
                label="Sửa"
                class="p-button-sm mr-2"
                outlined
                (click)="openEditDialog(rowIndex)"
              ></p-button>
              <p-button
                label="Xóa"
                class="p-button-sm mr-2"
                outlined
                (click)="deleteExpert(rowIndex)"
              ></p-button>
            </td>
          </tr>
        </ng-template>
  
        <!-- Empty Data Message -->
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="3" class="text-center">Không tìm thấy dữ liệu</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </p-card>
  
  <!-- ==========================
       1. Add Dialog
  ========================== -->
  <p-dialog
    header="Thêm chuyên gia"
    [(visible)]="displayAddDialog"
    [modal]="true"
    [style]="{ width: '1000px' }"
    [draggable]="false"
    [resizable]="false"
    class="custom-dialog"
  >
    <!-- Dialog Content -->
    <ng-template pTemplate="content">
      <!-- Main section for form -->
      <section class="p-8 w-full bg-white rounded-xl">
        <div class="flex flex-wrap gap-4">
          <!-- Tên chuyên gia -->
          <div class="w-full md:w-1/2">
            <label class="block font-semibold mb-2">Tên chuyên gia <span class="text-red-500">*</span></label>
            <input
              pInputText
              [(ngModel)]="addName"
              class="w-full p-2 border border-gray-300 rounded"
              placeholder="Nhập tên chuyên gia"
            />
          </div>
      
          <!-- Email -->
          <div class="w-full md:w-1/2">
            <label class="block font-semibold mb-2">Email <span class="text-red-500">*</span></label>
            <input
              pInputText
              [(ngModel)]="addEmail"
              class="w-full p-2 border border-gray-300 rounded"
              placeholder="Nhập email"
            />
          </div>
      
          <!-- Số điện thoại -->
          <div class="w-full md:w-1/2">
            <label class="block font-semibold mb-2">Số điện thoại</label>
            <input
              pInputText
              [(ngModel)]="addPhone"
              class="w-full p-2 border border-gray-300 rounded"
              placeholder="Nhập số điện thoại"
            />
          </div>
      
          <!-- MST -->
          <div class="w-full md:w-1/2">
            <label class="block font-semibold mb-2">MST</label>
            <input
              pInputText
              [(ngModel)]="addTaxNumber"
              class="w-full p-2 border border-gray-300 rounded"
              placeholder="Nhập mã số thuế"
            />
          </div>
      
          <!-- Địa chỉ -->
          <div class="w-full">
            <label class="block font-semibold mb-2">Địa chỉ</label>
            <textarea
              pInputTextarea
              [(ngModel)]="addAddress"
              rows="3"
              class="w-full p-2 border border-gray-300 rounded"
              placeholder="Nhập địa chỉ"
            ></textarea>
          </div>
        </div>
      </section>
      
    </ng-template>
  
    <!-- Dialog Footer -->
    <ng-template pTemplate="footer">
      <div class="flex justify-end gap-4 p-2">
        <button
          pButton
          type="button"
          label="Hủy"
          class="p-button-text text-gray-500 hover:text-gray-700"
          (click)="closeDialog('add')"
        ></button>
        <button
          pButton
          type="button"
          label="Lưu"
          class="p-button-warning"
          (click)="saveNewExpert()"
        ></button>
      </div>
    </ng-template>
  </p-dialog>
  
  <!-- ==========================
       2. Detail Dialog
  ========================== -->
  <p-dialog
    header="Chi tiết chuyên gia"
    [(visible)]="displayDetailDialog"
    [modal]="true"
    [style]="{ width: '1000px', minHeight: '55vh' }"
    [draggable]="false"
    [resizable]="false"
    class="custom-dialog"
  >
  <ng-template pTemplate="content">
    <section class="p-8 w-full bg-white rounded-xl" *ngIf="detailExpert">
      <div class="flex flex-wrap gap-4">
        <div class="flex-1 min-w-[250px]">
          <label class="block font-semibold mb-2">Tên chuyên gia</label>
          <p class="p-2 border border-gray-300 rounded">{{ detailExpert.name }}</p>
        </div>
  
        <div class="flex-1 min-w-[250px]">
          <label class="block font-semibold mb-2">Email</label>
          <p class="p-2 border border-gray-300 rounded">{{ detailExpert.email }}</p>
        </div>
      </div>
  
      <div class="flex flex-wrap gap-4 mt-4">
        <div class="flex-1 min-w-[250px]">
          <label class="block font-semibold mb-2">Số điện thoại</label>
          <p class="p-2 border border-gray-300 rounded">{{ detailExpert.phone }}</p>
        </div>
  
        <div class="flex-1 min-w-[250px]">
          <label class="block font-semibold mb-2">MST</label>
          <p class="p-2 border border-gray-300 rounded">{{ detailExpert.taxNumber }}</p>
        </div>
      </div>
  
      <div class="mt-4">
        <label class="block font-semibold mb-2">Địa chỉ</label>
        <p class="p-2 border border-gray-300 rounded whitespace-pre-line">
          {{ detailExpert.address }}
        </p>
      </div>
    </section>
  </ng-template>
  
  
    <!-- Dialog Footer -->
    <ng-template pTemplate="footer">
      <div class="flex justify-end gap-4 p-2">
        <button
          pButton
          type="button"
          label="Đóng"
          class="p-button-text text-gray-500 hover:text-gray-700"
          (click)="closeDialog('detail')"
        ></button>
      </div>
    </ng-template>
  </p-dialog>
  
  <!-- ==========================
       3. Edit Dialog
  ========================== -->
  <p-dialog
    header="Chỉnh sửa chuyên gia"
    [(visible)]="displayEditDialog"
    [modal]="true"
    [style]="{ width: '1000px' }"
    [draggable]="false"
    [resizable]="false"
    class="custom-dialog"
  >
  <ng-template pTemplate="content">
    <section class="p-8 w-full bg-white rounded-xl">
      <div class="flex flex-wrap gap-4">
        <!-- Tên chuyên gia -->
        <div class="flex-1 min-w-[250px]">
          <label class="block font-semibold mb-2">Tên chuyên gia <span class="text-red-500">*</span></label>
          <input pInputText [(ngModel)]="editName" class="w-full p-2 border border-gray-300 rounded" />
        </div>
  
        <!-- Email -->
        <div class="flex-1 min-w-[250px]">
          <label class="block font-semibold mb-2">Email <span class="text-red-500">*</span></label>
          <input pInputText [(ngModel)]="editEmail" class="w-full p-2 border border-gray-300 rounded" />
        </div>
      </div>
  
      <div class="flex flex-wrap gap-4 mt-4">
        <!-- Số điện thoại -->
        <div class="flex-1 min-w-[250px]">
          <label class="block font-semibold mb-2">Số điện thoại</label>
          <input pInputText [(ngModel)]="editPhone" class="w-full p-2 border border-gray-300 rounded" />
        </div>
  
        <!-- MST -->
        <div class="flex-1 min-w-[250px]">
          <label class="block font-semibold mb-2">MST</label>
          <input pInputText [(ngModel)]="editTaxNumber" class="w-full p-2 border border-gray-300 rounded" />
        </div>
      </div>
  
      <div class="mt-4">
        <label class="block font-semibold mb-2">Địa chỉ</label>
        <textarea pInputTextarea [(ngModel)]="editAddress" rows="4"
          class="w-full p-2 border border-gray-300 rounded"></textarea>
      </div>
    </section>
  </ng-template>
  
  
  
    <!-- Dialog Footer -->
    <ng-template pTemplate="footer">
      <div class="flex justify-end gap-4 p-2">
        <button
          pButton
          type="button"
          label="Hủy"
          class="p-button-text text-gray-500 hover:text-gray-700"
          (click)="closeDialog('edit')"
        ></button>
        <button
          pButton
          type="button"
          label="Lưu thay đổi"
          class="p-button-warning"
          (click)="saveEditedExpert()"
        ></button>
      </div>
    </ng-template>
  </p-dialog>
