<p-dialog header="Chỉnh sửa tài liệu" [(visible)]="displayAddDialog" [modal]="true" [draggable]="false"
    [resizable]="false" class="custom-dialog" (onHide)="closeDialog()" [style]="{width: '400px', height: '600px'}">
    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl" *ngIf="template">
            <div class="flex flex-wrap gap-4 w-full">
                <div class="flex-1 min-w-[250px]">
                    <label class="block mb-2">Tên tài liệu <span class="text-red-500">*</span></label>
                    <input pInputText type="text" class="w-full p-2 border rounded" [(ngModel)]="template.templateName"
                        name="templateName" #templateNameRef="ngModel" required minlength="3" maxlength="100"
                        pattern="^\s*\S.*$" />
                    <small class="text-red-500"
                        *ngIf="templateNameRef.invalid && (templateNameRef.dirty || templateNameRef.touched)">
                        <span *ngIf="templateNameRef.errors?.['required']">Tên mẫu tài liệu là bắt buộc.</span>
                        <span *ngIf="templateNameRef.errors?.['minlength']">Tên phải có ít nhất 3 ký tự.</span>
                        <span *ngIf="templateNameRef.errors?.['maxlength']">Tên không được vượt quá 100 ký tự.</span>
                        <span *ngIf="templateNameRef.errors?.['pattern']">Tên không được chỉ chứa khoảng trắng.</span>
                    </small>
                </div>

                <div class="flex-1 min-w-[250px]">
                    <label class="block mb-2">Loại tài liệu</label>
                    <input pInputText type="text" class="w-full p-2 border rounded" [(ngModel)]="template.templateType"
                        name="templateType" #templateTypeRef="ngModel" maxlength="100" />
                    <small class="text-red-500"
                        *ngIf="templateTypeRef.invalid && (templateTypeRef.dirty || templateTypeRef.touched)">
                        <span *ngIf="templateTypeRef.errors?.['maxlength']">Loại mẫu tài liệu không được vượt quá 100 ký
                            tự.</span>
                    </small>
                </div>
            </div>

            <!-- File đính kèm -->
            <div class="flex flex-col gap-2 mt-3">
                <label class="block font-semibold text-orange-500">File đính kèm <span class="text-red-500">*</span></label>
                <!-- Upload File -->
                <p-fileupload (onSelect)="onFileSelect($event)" [showUploadButton]="false" [multiple]="false"
                    accept=".pdf" maxFileSize="5000000" mode="advanced">
                    <ng-template #empty>
                        <div>Kéo thả file để đăng tải.</div>
                    </ng-template>
                    <ng-template #content>
                        <ul *ngIf="uploadedFiles.length">
                            <li *ngFor="let file of uploadedFiles">{{ file.name }} - {{ file.size }} bytes</li>
                        </ul>
                    </ng-template>
                </p-fileupload>

                <!-- Nút tải file đính kèm -->
                <div *ngIf="template.url && selectedId" class="flex items-center gap-4">
                    <p-button icon="pi pi-file" label="Xem file đính kèm" (click)="viewFile(template.url)" outlined>
                    </p-button>
                    <p-button icon="pi pi-download" text (click)="downloadFile(template.downloadUrl)">
                    </p-button>
                </div>
            </div>
        </section>
    </ng-template>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-4 p-2">
            <p-button label="Hủy" text (click)="closeDialog()"></p-button>
            <p-button label="Lưu" (click)="save()"></p-button>
        </div>
    </ng-template>
</p-dialog>

<p-toast></p-toast>
<div *ngIf="isLoading" class="overlay-spinner">
    <p-progressSpinner></p-progressSpinner>
</div>
