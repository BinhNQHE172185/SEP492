<p-card>
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-orange-500">Quản lý nhân sự</h2>
        <p-button label="Thêm" icon="pi pi-plus" (onClick)="openNew()"></p-button>
    </div>

    <div class="mt-3">
        <p-inputgroup class="w-full">
            <p-button label="Tìm kiếm" />
            <input [(ngModel)]="searchKey" (ngModelChange)="onSearchChange($event)" pInputText placeholder="Từ khóa" />
        </p-inputgroup>
    </div>

    <div class="mt-3">
        <p-table #dt [value]="users" [rows]="10" [columns]="cols" [paginator]="true"
            [globalFilterFields]="['name', 'status', 'email']" [rowHover]="true" dataKey="id"
            currentPageReportTemplate="Hiện {first} tới {last} của {totalRecords} nhân viên"
            [showCurrentPageReport]="true" [rowsPerPageOptions]="[10, 20, 30]">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="name" style="width: 30%;">
                        Tên
                        <p-sortIcon field="name" />
                    </th>
                    <th>Email</th>
                    <th class="text-center">Trạng thái</th>
                    <th>Vai trò</th>
                    <th>Hành động</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-user>
                <tr>
                    <td>{{ user.name || '(Đang chờ cập nhật)' }}</td>
                    <td pEditableColumn pEditableColumnField="email" [pEditableColumnDisabled]="user.status !== 1">
                        <p-cellEditor>
                            <ng-template pTemplate="input">
                                <div class="flex items-center gap-1">
                                    <input pInputText type="text" [(ngModel)]="user.localPart" required maxlength="30"
                                        style="width: 150px" (keydown.enter)="onUpdateUser(user.id, user.localPart)" />
                                    <span>&#64;fpt.edu.vn</span>
                                </div>
                            </ng-template>

                            <ng-template pTemplate="output">
                                {{ user.email }}
                            </ng-template>
                        </p-cellEditor>
                    </td>
                    <td [pEditableColumn]="user.status" pEditableColumnField="status"
                        [pEditableColumnDisabled]="user.status === 1">
                        <p-cellEditor>
                            <ng-template pTemplate="input">
                                <p-dropdown [options]="statusOptions" [(ngModel)]="user.status" optionLabel="label"
                                    optionValue="value" (onChange)="onStatusChange(user.id, $event.value)"
                                    appendTo="body">
                                </p-dropdown>
                            </ng-template>

                            <ng-template pTemplate="output">
                                <p-tag [value]="getStatusLabel(user.status)" [severity]="getTagSeverity(user.status)">
                                </p-tag>
                            </ng-template>
                        </p-cellEditor>
                    </td>
                    <td [pEditableColumn]="user.roles[0]" pEditableColumnField="roles">
                        <p-cellEditor>
                            <ng-template pTemplate="input">
                                <p-dropdown [options]="roles" [(ngModel)]="user.roles[0]" placeholder="Chọn vai trò"
                                    optionLabel="label" optionValue="value"
                                    (onChange)="onRoleChange(user.id, $event.value)" appendTo="body"></p-dropdown>
                            </ng-template>
                            <ng-template pTemplate="output">
                                <p-tag [value]="getRoleLabel(user.roles[0])"
                                    [severity]="getTagSeverityRole(user.roles[0])">
                                </p-tag>
                            </ng-template>
                        </p-cellEditor>
                    </td>
                    <td>
                        <p-button icon="pi pi-trash" outlined (onClick)="deleteUser(user.id)"></p-button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
    <div class="mt-1 text-sm text-gray-500 italic">
        * Nhấn vào <strong>Trạng thái</strong> hoặc <strong>Vai trò</strong> hoặc <strong>Email</strong> để cập nhật
        thông tin nhân viên.
    </div>
    <div class="mt-1 text-sm text-gray-500 italic">
        * Nhấn vào <strong>Enter</strong> khi cập nhật <strong>Email</strong> để cập nhật email nhân viên.
    </div>
</p-card>

<p-dialog [(visible)]="userDialog" [style]="{ width: '350px' }" header="Thêm nhân viên" [modal]="true">
    <div class="flex flex-col gap-6">
        <div>
            <label for="email" class="block font-bold mb-3">Email</label>
            <input type="text" pInputText id="email" [(ngModel)]="staffId" required autofocus /> &#64;fpt.edu.vn
        </div>
    </div>

    <ng-template pTemplate="footer">
        <p-button label="Hủy" icon="pi pi-times" text (click)="hideDialog()" />
        <p-button label="Lưu" icon="pi pi-check" (onClick)="saveUser()" />
    </ng-template>
</p-dialog>
<p-toast></p-toast>
<div *ngIf="isLoading" class="overlay-spinner">
    <p-progressSpinner></p-progressSpinner>
</div>
