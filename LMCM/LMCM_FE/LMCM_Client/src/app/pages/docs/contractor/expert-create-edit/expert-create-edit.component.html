<p-dialog header="Thêm chuyên gia" [(visible)]="displayAddDialog" [modal]="true" [draggable]="false" [resizable]="false"
    class="custom-dialog" (onHide)="closeDialog()">
    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl">
            <div class="flex flex-col gap-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="block font-semibold text-orange-500">Tên chuyên gia <span class="text-red-500">*</span></label>
                        <input pInputText [(ngModel)]="expert.contractorName" class="w-full p-2 border border-gray-300 rounded" 
                            placeholder="Nhập tên chuyên gia" />
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="block font-semibold text-orange-500">Email <span class="text-red-500">*</span></label>
                        <input pInputText [(ngModel)]="expert.email" class="w-full p-2 border border-gray-300 rounded" 
                            placeholder="Nhập email" />
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="block font-semibold text-orange-500">Số điện thoại</label>
                        <input pInputText [(ngModel)]="expert.phoneNumber" class="w-full p-2 border border-gray-300 rounded" 
                            placeholder="Nhập số điện thoại" />
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="block font-semibold text-orange-500">Mã số thuế</label>
                        <input pInputText [(ngModel)]="expert.taxCode" class="w-full p-2 border border-gray-300 rounded" 
                            placeholder="Nhập mã số thuế" />
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="block font-semibold text-orange-500">Mã nhân viên</label>
                        <input pInputText [(ngModel)]="expert.employeeCode" class="w-full p-2 border border-gray-300 rounded" 
                            placeholder="Nhập mã nhân viên" />
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="block font-semibold text-orange-500">CMND/CCCD</label>
                        <input pInputText [(ngModel)]="expert.idCardNumber" class="w-full p-2 border border-gray-300 rounded" 
                            placeholder="Nhập số CMND/CCCD" />
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="block font-semibold text-orange-500">Nơi cấp CMND/CCCD</label>
                        <input pInputText [(ngModel)]="expert.idIssuedPlace" class="w-full p-2 border border-gray-300 rounded" 
                            placeholder="Nhập nơi cấp CMND/CCCD" />
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="block font-semibold text-orange-500">Chức vụ</label>
                        <input pInputText [(ngModel)]="expert.position" class="w-full p-2 border border-gray-300 rounded" 
                            placeholder="Nhập chức vụ" />
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="block font-semibold text-orange-500">Số tài khoản ngân hàng</label>
                        <input pInputText [(ngModel)]="expert.bankAccountNumber" class="w-full p-2 border border-gray-300 rounded" 
                            placeholder="Nhập số tài khoản ngân hàng" />
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="block font-semibold text-orange-500">Tên ngân hàng</label>
                        <input pInputText [(ngModel)]="expert.bankName" class="w-full p-2 border border-gray-300 rounded" 
                            placeholder="Nhập tên ngân hàng" />
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Địa chỉ</label>
                    <textarea pInputTextarea [(ngModel)]="expert.address" rows="2" class="w-full p-2 border border-gray-300 rounded" 
                        placeholder="Nhập địa chỉ"></textarea>
                </div>
            </div>
        </section>
    </ng-template>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-4 p-2">
            <button pButton type="button" label="Hủy" class="p-button-text text-gray-500 hover:text-gray-700" (click)="closeDialog()"></button>
            <button pButton type="button" label="Lưu" class="p-button-warning" (click)="save()"></button>
        </div>
    </ng-template>
</p-dialog>
<p-toast></p-toast>
