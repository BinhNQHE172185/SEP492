<p-card class="p-4 shadow-lg rounded-lg">
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-orange-500">Lịch sử thay đổi</h2>
        <p-button label="Nhập" icon="pi pi-upload" class="p-button-warning"></p-button>
    </div>
  
    <div class="mt-3">
      <p-inputgroup class="w-full">
        <p-button label="Tìm kiếm" />
          <input [(ngModel)]="searchKey" pInputText placeholder="Từ khóa" />
      </p-inputgroup>
    </div>
  
    <div class="mt-4">
        <p-table  [rows]="pageSize" [paginator]="true" [totalRecords]="totalCount" class="w-full">
            <ng-template pTemplate="header">
                <tr>
                    <th>Mã môn</th>
                    <th>Tên môn</th>
                    <th>Loại thay đổi</th>
                    <th>Ngày hoàn thành</th>
                    <th>Kỳ bắt đầu áp dụng</th>
                    <th>Hành động</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td> 

                    <td>
                        
                        <p-button label="Edit" class="p-button-text p-button-sm p-button-danger"
                                  ></p-button>
                        <p-button label="Xóa" class="p-button-text p-button-sm p-button-danger"
                                  ></p-button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
  
    <p-confirmDialog></p-confirmDialog>
  
</p-card>
