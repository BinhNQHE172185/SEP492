<h2 class="text-xl font-bold text-orange-500 mb-3">Hồ Sơ Cá Nhân</h2>
<p-card class="p-4 shadow-lg rounded-lg">
    <label for="fileInput"
    class="w-24 h-24 bg-gray-300 border-circle flex justify-center items-center cursor-pointer overflow-hidden">
    <img *ngIf="user.avatar" [src]="user.avatar" alt="Avatar" class="w-full h-full object-cover">
    <span *ngIf="!user.avatar" class="text-gray-500 text-sm">Upload</span>
</label>
<input id="fileInput" type="file" accept="image/*" (change)="onFileSelected($event)" class="hidden">
    <div class="flex align-items-center mt-3">
        
        <div>
            <p class="text-orange-500 font-semibold mb-1">Họ và tên</p>
            <p class="text-gray-700 mb-3">{{ user.name }}</p>
            <p class="text-orange-500 font-semibold mb-1">Email</p>
            <p class="text-gray-700">{{ user.email }}</p>
        </div>
    </div>
</p-card>
