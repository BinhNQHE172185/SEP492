<p-dialog header="Chi tiết tờ trình" [(visible)]="displayDetailDialog" [modal]="true"
    [resizable]="true" class="custom-dialog" (onHide)="closeDialog()">
    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl" *ngIf="report">
            <div class="flex flex-wrap gap-4">
                <div class="flex flex-col grow basis-0 gap-2">
                    <label class="block font-semibold text-orange-500">Người tạo</label>
                    <p>{{ report.author.name }}</p>
                </div>
                <div class="flex flex-col grow basis-0 gap-2">
                    <label class="block font-semibold text-orange-500">Ngày</label>
                    <p>{{ report.proposalDate | date: 'dd/MM/yyyy' }}</p>
                </div>
            </div>
            <div class="flex flex-col gap-2 mt-4">
                <label class="block font-semibold text-orange-500">Tiêu đề tờ trình</label>
                <p class="whitespace-pre-line">{{ report.title }}</p>
            </div>
            <div class="flex flex-col gap-2 mt-4">
                <label class="block font-semibold text-orange-500">File đính kèm</label>
                <div *ngIf="report.url; else noFile" class="flex items-center gap-2">
                    <p-button (click)="downloadFile(report.url)" outlined>
                        <i class="pi pi-download" ></i>Tải file đính kèm
                    </p-button>
                </div>
                <ng-template #noFile>
                    <p class="text-gray-500 italic">Không có file đính kèm</p>
                </ng-template>
            </div>
        </section>
    </ng-template>
</p-dialog>
