<p-card class="p-4 shadow-lg rounded-lg">
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-orange-500">Danh sách chương trình giảng dạy</h2>
        <p-button label="Nhập" icon="pi pi-upload" class="p-button-warning"></p-button>
    </div>
  
    <div class="mt-3">
      <p-inputgroup class="w-full">
          <p-button icon="pi pi-search"></p-button>
          <input [(ngModel)]="searchKey" pInputText placeholder="Keyword" />
      </p-inputgroup>
    </div>
  
    <div class="mt-4">
        <p-table  [rows]="pageSize" [paginator]="true" [totalRecords]="totalCount" class="w-full">
            <ng-template pTemplate="header">
                <tr>
                    <th>Code</th>
                    <th>Tên</th>
                    <th>Miêu tả</th>
                    <th>Quyết định số</th>
                    <th>Ngày phê duyệt</th>
                    <th>Hành động</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item>
                <tr>
                    <td>{{ item.curriculumCode }}</td>
                    <td> {{ item.name }}  </td>
                    <td>{{ item.description }}</td>
                    <td>{{ item.decisionNo }}</td>
                    <td>{{ item.approvedDate | date:'dd/MM/yyyy' }}</td> 

                    <td>
                        <p-button label="Xóa" class="p-button-text p-button-sm p-button-danger"
                                  ></p-button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
  
    <p-confirmDialog></p-confirmDialog>
  
</p-card>
