<p-card>
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-orange-500">Đơn vị bảng tính giá trị hợp đồng</h2>
        <p-button label="Lưu" class="p-button-warning" (click)="updateContractValue()"></p-button>
    </div>

    <div class="mt-4">
        <p-table #dt [value]="contractValues" [paginator]="false" [lazy]="true" [rowHover]="true" class="w-full"
            *ngIf="contractValues && contractValues.length > 0; else noDataTemplate">
            <ng-template pTemplate="header">
                <tr>
                    <th>Hạng mục</th>
                    <th>Đơn vị tính</th>
                    <th>Tỷ lệ chuẩn</th>
                    <th>Giá trị hợp đồng</th>
                    <th>Yêu cầu chất lượng</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td pEditableColumn>
                        <p-cellEditor>
                            <ng-template pTemplate="input">
                                <input pInputText [(ngModel)]="item.category" />
                            </ng-template>
                            <ng-template pTemplate="output">
                                {{ item.category }}
                            </ng-template>
                        </p-cellEditor>
                    </td>

                    <td pEditableColumn>
                        <p-cellEditor>
                            <ng-template pTemplate="input">
                                <input pInputText [(ngModel)]="item.measurementUnit" />
                            </ng-template>
                            <ng-template pTemplate="output">
                                {{ item.measurementUnit }}
                            </ng-template>
                        </p-cellEditor>
                    </td>

                    <td pEditableColumn>
                        <p-cellEditor>
                            <ng-template pTemplate="input">
                                <p-inputNumber [(ngModel)]="item.standardRate" [minFractionDigits]="1"
                                    [maxFractionDigits]="2" mode="decimal"></p-inputNumber>
                            </ng-template>
                            <ng-template pTemplate="output">
                                <p-tag [value]="item.standardRate" severity="info"></p-tag>
                            </ng-template>
                        </p-cellEditor>
                    </td>

                    <td pEditableColumn>
                        <p-cellEditor>
                            <ng-template pTemplate="input">
                                <p-inputNumber [(ngModel)]="item.contractValue" [mode]="'currency'" currency="VND"
                                    locale="vi-VN" [minFractionDigits]="0"></p-inputNumber>
                            </ng-template>
                            <ng-template pTemplate="output">
                                {{ item.contractValue | currency:'VND':'symbol':'1.0-0':'vi-VN' }}
                            </ng-template>
                        </p-cellEditor>
                    </td>

                    <td pEditableColumn>
                        <p-cellEditor>
                            <ng-template pTemplate="input">
                                <textarea pTextarea [(ngModel)]="item.qualityRequirements" autoResize="false" rows="5"
                                    cols="30" style="width: 100%;">
                                </textarea>
                            </ng-template>
                            <ng-template pTemplate="output">
                                {{ item.qualityRequirements }}
                            </ng-template>
                        </p-cellEditor>
                    </td>
                </tr>
            </ng-template>
        </p-table>

        <ng-template #noDataTemplate>
            <div class="text-center text-gray-500 p-4">
                Không tìm thấy dữ liệu
            </div>
        </ng-template>
    </div>
</p-card>
