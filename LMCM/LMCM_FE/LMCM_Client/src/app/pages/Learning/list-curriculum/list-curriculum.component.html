<p-card class="p-4 shadow-lg rounded-lg">
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-orange-500">Danh sách chương trình giảng dạy</h2>
        <p-button label="Nhập" icon="pi pi-upload" class="p-button-warning"></p-button>
    </div>

    <div class="mt-3">
        <p-inputgroup class="w-full">
            <p-button label="Search" />
            <input [(ngModel)]="searchKey" (ngModelChange)="loadCurriculums()" pInputText placeholder="Keyword" />
        </p-inputgroup>
    </div>

    <div class="mt-4">
        <p-table 
        [value]="curriculums" 
        [rows]="pageSize" 
        [paginator]="true" 
        [lazy]="true"
        [totalRecords]="totalCount" 
        (onPage)="loadCurriculums($event)" 
        [rowHover]="true"
        currentPageReportTemplate="Hiện {first} tới {last} của {totalRecords} syllabus"
        [showCurrentPageReport]="true"
        [rowsPerPageOptions]="[10, 20, 30]"
        class="w-full">
            <ng-template pTemplate="header">
                <tr>
                    <th>Mã chương trình</th>
                    <th>Tên chương trình</th>
                    <th>Miêu tả</th>
                    <th>Quyết định số</th>
                    <th>Ngày phê duyệt</th>
                    <th>Hành động</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td>{{ item.curriculumCode }}</td>
                    <td>{{ item.name }}</td>
                    <td>{{ item.description }}</td>
                    <td>{{ item.decisionNo }}</td>
                    <td>{{ item.approvedDate | date: 'dd/MM/yyyy' }}</td>
                    <td>
                        <button pButton type="button" label="Xóa" 
                                (click)="confirmDelete(item.curriculumId, i)"></button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <!-- Hộp thoại xác nhận xóa -->
    <p-confirmDialog></p-confirmDialog>
    <p-toast></p-toast>
</p-card>
