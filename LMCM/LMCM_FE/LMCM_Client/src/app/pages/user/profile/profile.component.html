<p-card class="p-6 shadow-lg rounded-lg">
    <h2 class="text-2xl font-bold text-orange-500 mb-6">Hồ Sơ Cá Nhân</h2>

    <!-- Ảnh đại diện -->
    <div class="flex flex-col items-center mb-8">
        <div class="w-36 h-36 bg-gray-300 rounded-full flex justify-center items-center overflow-hidden border border-gray-400">
            <img *ngIf="user.avatar" [src]="user.avatar" alt="Avatar" class="w-full h-full object-cover" />
            <span *ngIf="!user.avatar" class="text-gray-500 text-sm">Chưa có ảnh</span>
        </div>
    </div>

    <!-- Thông tin người dùng (không còn input) -->
    <div class="flex flex-col items-center">
        <div class="w-400">
            <table class="w-full border-separate border-spacing-y-4">
                <tr>
                    <td class="text-orange-500 font-semibold pr-4 w-1/3">Họ và tên:</td>
                    <td>{{ user.name }}</td> <!-- Hiển thị thay vì input -->
                </tr>
                <tr>
                    <td class="text-orange-500 font-semibold pr-4">Email:</td>
                    <td>{{ user.email }}</td> <!-- Hiển thị thay vì input -->
                </tr>
            </table>
        </div>
    </div>
</p-card>
