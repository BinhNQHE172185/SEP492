<p-dialog header="Chi tiết tài liệu" [(visible)]="displayDetailDialog" [modal]="true" [draggable]="false"
    [resizable]="false" class="custom-dialog" (onHide)="closeDialog()"
    [style]="{width: '600px', height: 'auto', 'max-width': '90vw', 'max-height': '80vh'}">
    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl" *ngIf="template">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                <div class="flex flex-col gap-2 md:col-span-2">
                    <label class="block font-semibold text-orange-500">Tên tài liệu</label>
                    <p class="truncate">{{ template.templateName }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Loại tài liệu</label>
                    <p>{{ template.templateType }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Trạng thái</label>
                    <p>{{ template.status }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Người tạo</label>
                    <p>{{ template.author.name }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Ngày tạo</label>
                    <p class="whitespace-pre-line">{{ template.createdAt | date: 'dd/MM/yyyy' }}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Chỉnh sửa lần cuối</label>
                    <p class="whitespace-pre-line">{{ template.updatedAt | date: 'dd/MM/yyyy' }}</p>
                </div>

                <div class="flex flex-col gap-2 md:col-span-2">
                    <label class="block font-semibold text-orange-500">File đính kèm</label>
                    <div *ngIf="template.url; else noFile" class="flex items-center gap-2">
                        <p-button (click)="downloadFile(template.url)" outlined>
                            <i class="pi pi-download"></i> Tải file đính kèm
                        </p-button>
                    </div>
                    <ng-template #noFile>
                        <p class="text-gray-500 italic">Không có file đính kèm</p>
                    </ng-template>
                </div>
            </div>
        </section>
    </ng-template>
</p-dialog>
