<p-card>
    <!-- Tiêu đề và nút Thêm mới -->
    <div class="flex justify-between items-center mb-3">
        <h2 class="text-xl font-bold text-orange-500">Danh sách tài liệu</h2>
        <p-button label="Thêm mới" class="p-button-warning" (click)="openAddDialog()"></p-button>
    </div>
  
    <!-- Ô tìm kiếm -->
    <div class="mt-3">
        <p-inputGroup class="w-full">
            <p-button label="Tìm kiếm"></p-button>
            <input [(ngModel)]="searchKey" (ngModelChange)="onSearchChange()" pInputText placeholder="Tìm kiếm tài liệu..." />
        </p-inputGroup>
    </div>
  
    <!-- Bảng danh sách -->
    <div class="mt-4">
        <p-table [value]="filteredDocuments" [paginator]="true" [rows]="10" class="w-full"
            currentPageReportTemplate="Hiển thị {first} đến {last} trong tổng số {totalRecords} bản ghi"
            [showCurrentPageReport]="true" [rowsPerPageOptions]="[10, 20, 50]">
            
            <ng-template pTemplate="header">
                <tr>
                    <th>Tên tài liệu</th>
                    <th>Loại tài liệu</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </ng-template>
  
            <ng-template pTemplate="body" let-document let-rowIndex="rowIndex">
                <tr>
                    <td>{{ document.name }}</td>
                    <td>{{ document.type }}</td>
                    <td>
                        <span [ngClass]="{
                            'text-green-500': document.status === 'Đang sử dụng',
                            'text-yellow-500': document.status === 'Tạm ngưng'
                        }">{{ document.status }}</span>
                    </td>
                    <td>
                        <p-button label="Chi tiết" class="p-button-sm" outlined (click)="openDetailDialog(document)"></p-button>
                        <p-button label="Sửa" class="p-button-sm mr-2" outlined (click)="openEditDialog(document)"></p-button>
                        <p-button label="Xóa" class="p-button-sm" outlined (click)="confirmDelete(document, rowIndex)"></p-button>
                    </td>
                </tr>
            </ng-template>
  
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="4" class="text-center">Không có dữ liệu</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
  </p-card>

  <p-dialog 
    header="Chi tiết tài liệu" 
    [(visible)]="displayDetailDialog" 
    [modal]="true"
    [style]="{ width: '1000px', minHeight: '55vh' }" 
    [draggable]="false" 
    [resizable]="false" 
    class="custom-dialog">
    
    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl" *ngIf="selectedDocument">
            <div class="flex flex-wrap gap-4">
                <div class="flex-1 min-w-[250px]">
                    <label class="block mb-2">Tên tài liệu</label>
                    <input type="text" class="w-full p-2 border rounded" [value]="selectedDocument.name" readonly />
                </div>
                <div class="flex-1 min-w-[250px]">
                    <label class="block mb-2">Loại tài liệu</label>
                    <input type="text" class="w-full p-2 border rounded" [value]="selectedDocument.type" readonly />
                </div>
            </div>
            
            <div class="flex flex-wrap gap-4 mt-4">
                <div class="flex-1 min-w-[250px]">
                    <label class="block mb-2">Trạng thái</label>
                    <input type="text" class="w-full p-2 border rounded" [value]="selectedDocument.status" readonly />
                </div>
                <div class="flex-1 min-w-[250px]">
                    <label class="block mb-2">Người tạo</label>
                    <input type="text" class="w-full p-2 border rounded" [value]="selectedDocument.createdBy" readonly />
                </div>
            </div>

            <div class="flex flex-wrap gap-4 mt-4">
                <div class="flex-1 min-w-[250px]">
                    <label class="block mb-2">Ngày tạo</label>
                    <input type="text" class="w-full p-2 border rounded" [value]="selectedDocument.createdAt" readonly />
                </div>
                <div class="flex-1 min-w-[250px]">
                    <label class="block mb-2">Chỉnh sửa lần cuối</label>
                    <input type="text" class="w-full p-2 border rounded" [value]="selectedDocument.lastModified" readonly />
                </div>
            </div>

            

            <div class="file-attachment mt-4">
                <label class="mb-2 block">File đính kèm</label>    
                <div class="file-box" style="background-color: #fff3eb; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px; max-width: 300px;">
                    <i class="pi pi-file" style="font-size: 18px;"></i> 
                    <span class="file-name" style="flex-grow: 1; color: #333; font-weight: 500;">tailieu.pdf</span>             
                    <i class="pi pi-download" style="color: #ff6600; font-weight: bold; cursor: pointer;"></i> 
                    <span style="color: #ff6600; font-weight: 500; cursor: pointer;">Tải xuống</span>              
                </div>       
            </div>
        </section>
    </ng-template>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-4 p-2">
            <p-button label="Đóng" class="p-button-text" (click)="closeDialog('detail')"></p-button>
        </div>
    </ng-template>
</p-dialog>

<p-dialog 
    header="Chỉnh sửa tài liệu" 
    [(visible)]="displayEditDialog" 
    [modal]="true"
    [style]="{ width: '1000px', minHeight: '55vh' }" 
    [draggable]="false" 
    [resizable]="false" 
    class="custom-dialog">

    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl" *ngIf="selectedDocument">
            <div style="width: 50%;" class="flex flex-wrap gap-4">
                <div class="flex-1 min-w-[250px] w-1/2">
                    <label class="block mb-2">Tên tài liệu</label>
                    <input type="text" class="w-full p-2 border rounded" [(ngModel)]="selectedDocument.name" />
                </div>
            </div>

            <div style="width: 50%;" class="flex flex-wrap gap-4 mt-4">
                <div class="flex-1 min-w-[250px] w-1/2">
                    <label class="block mb-2">Loại tài liệu</label>
                    <p-dropdown 
                        [options]="documentTypes" 
                        [(ngModel)]="selectedDocument.type" 
                        placeholder="Chọn loại tài liệu"
                        class="w-full">
                    </p-dropdown>
                </div>
            </div>

            <div style="width: 50%;" class="flex flex-wrap gap-4 mt-4">
                <div class="flex-1 min-w-[250px] w-1/2">
                    <label class="block mb-2">Trạng thái</label>
                    <p-dropdown 
                        [options]="documentStatuses" 
                        [(ngModel)]="selectedDocument.status" 
                        placeholder="Chọn trạng thái"
                        class="w-full">
                    </p-dropdown>
                </div>
            </div>
           <div class="mt-4">
            <div style="margin-top: 10px; display: flex; align-items: center; gap: 5px; background-color: white; border: 1px solid #ff9249; color: #eb6e1b; padding: 8px 12px; border-radius: 6px; font-weight: 500; cursor: pointer; max-width: fit-content;">
                <i class="pi pi-plus" style="font-size: 14px;"></i> 
                <span>Thay đổi file PDF</span>
            </div>
        
            <p style="font-size: 12px; color: gray; margin-top: 5px;">Chỉ chấp nhận file PDF, dung lượng tối đa 5MB</p>
           </div>
       
            
        </section>
    </ng-template>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-4 p-2">
            <p-button label="Hủy" class="p-button-text" (click)="closeDialog('edit')"></p-button>
            <p-button label="Lưu" class="p-button-warning" (click)="saveEdit()"></p-button>
        </div>
    </ng-template>
</p-dialog>
