<p-card class="p-4 shadow-lg rounded-lg">
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-orange-500">Lịch sử thay đổi</h2>
        <p-button label="Thêm" class="p-button-warning" (click)="openAddDialog()"></p-button>
    </div>

    <div class="mt-3">
        <p-inputGroup class="w-full">
            <p-button label="Tìm kiếm" (click)="loadHistory()" />
            <input [(ngModel)]="searchKey" pInputText placeholder="Từ khóa" />
        </p-inputGroup>
    </div>

    <div class="mt-4">
        <p-table
            [value]="historyList"
            [rows]="pageSize"
            [paginator]="true"
            [totalRecords]="totalCount"
            [lazy]="true"
            (onPage)="loadHistory($event)"
            currentPageReportTemplate="Hiển thị {first} - {last} của {totalRecords} bản ghi"
            [showCurrentPageReport]="true"
            [rowsPerPageOptions]="[10, 20, 30]"
            [first]="(pageIndex - 1) * pageSize"
            class="w-full"
            *ngIf="historyList && historyList.length > 0; else noDataTemplate"
        >
            <ng-template pTemplate="header">
                <tr>
                    <th>Mã môn</th>
                    <th>Loại tài liệu</th>
                    <th>Loại thay đổi</th>
                    <th>Ngày hoàn thành</th>
                    <th>Kỳ bắt đầu áp dụng</th>
                    <th>Hành động</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-item>
                <tr>
                    <td>{{ item.courseCode }}</td>
                    <td>{{ item.learningMaterialType }}</td>
                    <td>{{ item.changeType }}</td>
                    <td>{{ item.completionDate | date: 'dd/MM/yyyy' }}</td>
                    <td>{{ item.startTerm }}</td>
                    <td>
                        <p-button label="Chi tiết" outlined (click)="showDetail(item)"></p-button>
                        <p-button label="Xóa" outlined (click)="confirmDelete(item)"></p-button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <ng-template #noDataTemplate>
        <p class="text-center text-gray-500 mt-4">Không có dữ liệu.</p>
    </ng-template>

    <p-confirmDialog></p-confirmDialog>
    <p-dialog [(visible)]="displayDetailDialog" [modal]="true" [closable]="true" header="Chi tiết thay đổi" [style]="{ width: '600px', 'border-radius': '8px' }">
        <div class="p-4">
            <div class="grid grid-cols-1 gap-3" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px">
                <div>
                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Mã môn *</label> <br />
                        <input pInputText [(ngModel)]="selectedItem.courseCode" /> <br />
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Ngày hoàn thành *</label> <br />
                        <p-calendar [(ngModel)]="selectedItem.completionDate" dateFormat="yy-mm-dd" class="w-full"></p-calendar> <br />
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Kỳ bắt đầu áp dụng *</label> <br />
                        <p-calendar [(ngModel)]="selectedItem.startTerm" dateFormat="yy-mm-dd" class="w-full"></p-calendar> <br />
                    </div >
                </div>
                <div>
                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Số hợp đồng</label> <br />
                        <input pInputText [(ngModel)]="selectedItem.contractNumber" /> <br />
                    </div>

                    <!-- Hiển thị loại thay đổi dưới dạng text -->
                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Loại thay đổi *</label> <br />
                        <input pInputText [(ngModel)]="selectedItem.changeType" /> <br />
                    </div>

                    <!-- Hiển thị loại thay đổi dưới dạng text -->
                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Loại học liệu *</label> <br />
                        <input pInputText [(ngModel)]="selectedItem.learningMaterialType" /> <br />
                    </div>
                </div>

                <div>
                    <label class="font-bold text-sm">Nội dung thay đổi *</label> <br />
                    <textarea pInputTextarea [(ngModel)]="selectedItem.changeDescription" rows="3" class="w-full p-inputtextarea p-component p-2 rounded-md border"></textarea>
                </div>
            </div>
        </div>

        <ng-template pTemplate="footer">
            <div class="flex justify-end gap-2">
                <button pButton label="Đóng" (click)="closeDetailDialog()"></button>
            </div>
        </ng-template>
    </p-dialog>

    <p-dialog [(visible)]="displayAddDialog" [modal]="true" [closable]="true" header="Thêm mới thông tin thay đổi" [style]="{ width: '600px', 'border-radius': '8px' }">
        <div class="p-4">
            <div class="grid grid-cols-1 gap-3" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px">
                <!-- Mã môn -->
                <div>
                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Mã môn *</label> <br />
                        <input pInputText [(ngModel)]="newHistory.courseCode" placeholder="Nhập mã môn" />
                    </div>

                    <!-- Ngày hoàn thành -->
                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Ngày hoàn thành *</label> <br />
                        <p-calendar [(ngModel)]="newHistory.completionDate" dateFormat="yy-mm-dd" class="w-full"></p-calendar>
                    </div>

                    <!-- Kỳ bắt đầu áp dụng -->
                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Kỳ bắt đầu áp dụng *</label> <br />
                        <p-calendar [(ngModel)]="newHistory.startTerm" dateFormat="yy-mm-dd" class="w-full"></p-calendar>
                    </div>
                </div>

                <div>
                    <!-- Số hợp đồng -->
                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Số hợp đồng</label> <br />
                        <input pInputText [(ngModel)]="newHistory.contractNumber" placeholder="Nhập số hợp đồng" />
                    </div>

                    <!-- Loại thay đổi -->
                    <!-- Hiển thị loại thay đổi dưới dạng text -->
                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Loại thay đổi *</label> <br />
                        <input pInputText [(ngModel)]="newHistory.changeType" />
                    </div>

                    <!-- Hiển thị loại thay đổi dưới dạng text -->
                    <div style="margin-bottom: 15px;">
                        <label class="font-bold text-sm">Loại học liệu *</label> <br />
                        <input pInputText [(ngModel)]="newHistory.learningMaterialType" />
                    </div>
                </div>

                <!-- Nội dung thay đổi -->
                <div>
                    <label class="font-bold text-sm">Nội dung thay đổi *</label>
                    <textarea pInputTextarea [(ngModel)]="newHistory.changeDescription" rows="3" class="w-full p-inputtextarea p-component p-2 rounded-md border"></textarea>
                </div>
            </div>
        </div>

        <ng-template pTemplate="footer">
            <div class="flex justify-end gap-2">
                <p-button label="Hủy" (click)="displayAddDialog = false"></p-button>
                <p-button label="Lưu" (click)="addHistory()"></p-button>
            </div>
        </ng-template>
    </p-dialog>
</p-card>
