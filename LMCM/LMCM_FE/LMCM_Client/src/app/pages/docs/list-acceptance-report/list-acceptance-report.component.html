<p-card>
  <!-- Tiêu đề và nút Thêm mới -->
  <div class="flex justify-between items-center mb-3">
      <h2 class="text-xl font-bold text-orange-500">Danh sách biên bản nghiệm thu</h2>
      <p-button label="Thêm mới" class="p-button-warning" (click)="openAddDialog()"></p-button>
  </div>

  <!-- Ô tìm kiếm -->
  <div class="mt-3">
      <p-inputGroup class="w-full">
          <p-button label="Tìm kiếm"></p-button>
          <input [(ngModel)]="searchKey" (ngModelChange)="onSearchChange()" pInputText placeholder="Tìm kiếm biên bản..." />
      </p-inputGroup>
  </div>

  <!-- Bảng danh sách -->
  <div class="mt-4">
      <p-table [value]="filteredReports" [paginator]="true" [rows]="10" class="w-full"
          currentPageReportTemplate="Hiển thị {first} đến {last} trong tổng số {totalRecords} bản ghi"
          [showCurrentPageReport]="true" [rowsPerPageOptions]="[10, 20, 50]">
          <ng-template pTemplate="header">
              <tr>
                  <th>Ngày nghiệm thu</th>
                  <th>Số hợp đồng</th>
                  <th>Giá trị quyết toán</th>
                  <th>Hành động</th>
              </tr>
          </ng-template>

          <ng-template pTemplate="body" let-report let-rowIndex="rowIndex">
              <tr>
                  <td>{{ report.date }}</td>
                  <td>{{ report.contractNumber }}</td>
                  <td>{{ report.finalPrice | currency:'VND' }}</td>
                  <td>
                      <p-button label="Chi tiết" class="p-button-sm" outlined (click)="openDetailDialog(report)"></p-button>
                      <p-button label="Sửa" class="p-button-sm mr-2" outlined (click)="openEditDialog(report)"></p-button>
                      <p-button label="Xóa" class="p-button-sm mr-2" outlined (click)="deleteReport(rowIndex)"></p-button>
                  </td>
              </tr>
          </ng-template>

          <ng-template pTemplate="emptymessage">
              <tr>
                  <td colspan="4" class="text-center">Không có dữ liệu</td>
              </tr>
          </ng-template>
      </p-table>
  </div>
</p-card>

<!-- Dialog Chi tiết biên bản -->
<p-dialog header="Chi tiết biên bản nghiệm thu" [(visible)]="displayDetailDialog" [modal]="true"
  [style]="{ width: '1000px', minHeight: '55vh' }" [draggable]="false" [resizable]="false" class="custom-dialog">
  <ng-template pTemplate="content">
      <section class="p-8 w-full bg-white rounded-xl" *ngIf="detailReport">
        <div class="grid gap-4 md:grid-cols-2">
            <div>
                <label class="block mb-2">Ngày nghiệm thu</label>
                <input type="text" class="w-full p-2 border rounded" [value]="detailReport.date" readonly />
            </div>
            <div>
                <label class="block mb-2">Số hợp đồng</label>
                <input type="text" class="w-full p-2 border rounded" [value]="detailReport.contractNumber" readonly />
            </div>
        </div>
        
        <div class="grid gap-4 md:grid-cols-2 mt-4">
            <div>
                <label class="block mb-2">Giá cả quyết toán</label>
                <input type="text" class="w-full p-2 border rounded" [value]="detailReport.finalPrice | currency:'VND'" readonly />
            </div>
            <div>
                <label class="block mb-2">Người kiểm tra</label>
                <input type="text" class="w-full p-2 border rounded" [value]="detailReport.observer" readonly />
            </div>
        </div>
        
          <div class="mt-4">
            <label class="block mb-2">Nội dung nghiệm thu</label>
            <textarea 
                pInputTextarea
                [(ngModel)]="detailReport.content" 
                rows="8" 
                autoResize="true" 
                class="w-full p-2 rounded-md border"
                readonly
            ></textarea>
        </div>
        <div class="file-attachment mt-4">
            <label class="mb-2 block">File đính kèm</label>
            <div class="file-box" style="background-color: #fff3eb; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px;max-width: 300px;">
                <i class="pi pi-file" style="font-size: 18px;"></i> 
                <span class="file-name" style="flex-grow: 1; color: #333; font-weight: 500;">biennghiemthu.pdf</span>             
                <i class="pi pi-download" style="color: #ff6600; font-weight: bold; cursor: pointer;"></i> Tải xuống              
            </div>
        </div>
        
        
      </section>
  </ng-template>

  <ng-template pTemplate="footer">
      <div class="flex justify-end gap-4 p-2">
          <p-button label="Đóng" class="p-button-text" (click)="closeDialog('detail')"></p-button>
      </div>
  </ng-template>
</p-dialog>

<!-- Dialog Chỉnh sửa biên bản -->
<p-dialog header="Chỉnh sửa biên bản nghiệm thu" [(visible)]="displayEditDialog" [modal]="true"
  [style]="{ width: '1000px', minHeight: '55vh' }" [draggable]="false" [resizable]="false" class="custom-dialog">
  <ng-template pTemplate="content">
      <section class="p-8 w-full bg-white rounded-xl" *ngIf="selectedItem">
          <div class="grid gap-4 md:grid-cols-2">
              <div>
                  <label class="block font-semibold mb-2">Ngày nghiệm thu</label>
                  <input pInputText [(ngModel)]="selectedItem.date" class="w-full" />
              </div>
              <div>
                  <label class="block font-semibold mb-2">Số hợp đồng</label>
                  <input pInputText [(ngModel)]="selectedItem.contractNumber" class="w-full" />
              </div>
          </div>

          <div class="grid gap-4 md:grid-cols-2 mt-4">
              <div>
                  <label class="block font-semibold mb-2">Giá cả quyết toán</label>
                  <input pInputText [(ngModel)]="selectedItem.finalPrice" class="w-full" />
                  <span pInputGroupAddon> {{ selectedItem.finalPrice | number }} VND</span>
              </div>
              <div>
                  <label class="block font-semibold mb-2">Người kiểm tra</label>
                  <input pInputText [(ngModel)]="selectedItem.observer" class="w-full" />
              </div>
          </div>

          <div class="mt-4">
              <label class="block font-semibold mb-2">Nội dung nghiệm thu</label>
              <textarea pInputTextarea [(ngModel)]="selectedItem.content" rows="8" autoResize="true"
                  class="w-full p-2 rounded-md border"></textarea>
          </div>
          <div class="file-attachment mt-4">
            <label class="mb-2 block">File đính kèm</label>
            <div class="file-box" style="background-color: #fff3eb; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px;max-width: 300px;">
                <i class="pi pi-file" style="font-size: 18px;"></i> 
                <span class="file-name" style="flex-grow: 1; color: #333; font-weight: 500;">biennghiemthu.pdf</span>             
                <i class="pi pi-download" style="color: #ff6600; font-weight: bold; cursor: pointer;"></i> Tải xuống              
            </div>
        </div>
        
      </section>
  </ng-template>

  <ng-template pTemplate="footer">
      <div class="flex justify-end gap-4 p-2">
          <p-button label="Hủy" class="p-button-text" (click)="closeDialog('edit')"></p-button>
          <p-button label="Lưu" (click)="saveEdit()"></p-button>
      </div>
  </ng-template>
</p-dialog>
