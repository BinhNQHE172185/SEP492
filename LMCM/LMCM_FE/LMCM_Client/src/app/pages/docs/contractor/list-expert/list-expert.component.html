<p-card>
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-orange-500">Quản lý chuyên gia</h2>
        <p-button label="Thêm" class="p-button-warning" (click)="openAddDialog()"></p-button>
    </div>

    <div class="mt-3">
        <p-inputGroup class="w-full">
            <p-button label="Tìm kiếm"></p-button>
            <input [(ngModel)]="searchKey" (ngModelChange)="onSearchChange($event)" pInputText
                placeholder="Tìm kiếm chuyên gia..." />
        </p-inputGroup>
    </div>

    <div class="mt-4">
        <p-table [value]="expert" [rows]="5" [paginator]="true" class="w-full"
            currentPageReportTemplate="Hiện {first} tới {last} của {totalRecords} chuyên gia"
            [showCurrentPageReport]="true" [rowsPerPageOptions]="[5, 10, 20]">
            <ng-template pTemplate="header">
                <tr>
                    <th>Chuyên Gia</th>
                    <th>Email</th>
                    <th style="display: flex; justify-content: center;">Hành Động</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-expert>
                <tr>
                    <td>{{ expert.contractorName }}</td>
                    <td>{{ expert.email }}</td>
                    <td class="p-2 flex justify-center gap-2">
                        <p-button label="Chi tiết" outlined severity="info"
                            (click)="openDetailDialog(expert.contractorId)"></p-button>
                        <p-button label="Sửa" outlined (click)="openAddDialog(expert.contractorId)"></p-button>
                        <p-button label="Xóa" outlined severity="danger"
                            (click)="deleteE(expert.contractorId)"></p-button>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="3" class="text-center">Không tìm thấy dữ liệu</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</p-card>

<app-expert-create-edit [displayAddDialog]="displayAddDialog" [selectedId]="selectedId!"
    (closeDialogEvent)="handleCloseDialog(!isDetail)"> </app-expert-create-edit>

<app-expert-detail [expertId]="expertId!" [displayDetailDialog]="displayDetailDialog"
    (closeDialogEvent)="handleCloseDialog(isDetail)" [hidden]="!displayDetailDialog"> </app-expert-detail>

<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>
<div *ngIf="isLoading" class="overlay-spinner">
    <p-progressSpinner></p-progressSpinner>
</div>
