<p-dialog header="Thêm tờ trình" [(visible)]="displayAddDialog" [modal]="true" class="custom-dialog"
    (onHide)="closeDialog()">
    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl">
            <div class="flex flex-col gap-4">
                <div class="flex flex-col gap-2">
                    <label class="block font-semibold">Tiêu đề <span class="text-red-500">*</span></label>
                    <input pInputText name="addTitle" [(ngModel)]="addTitle" #addTitleRef="ngModel" required
                        minlength="3" maxlength="100" pattern="^\s*\S.*$"
                        class="w-full p-2 border border-gray-300 rounded" placeholder="Nhập tiêu đề" />

                    <small class="text-red-500"
                        *ngIf="addTitleRef.invalid && (addTitleRef.dirty || addTitleRef.touched)">
                        <span *ngIf="addTitleRef.errors?.['required']">Tên tiêu đề là bắt buộc.</span>
                        <span *ngIf="addTitleRef.errors?.['minlength']">Phải có ít nhất 3 ký tự.</span>
                        <span *ngIf="addTitleRef.errors?.['maxlength']">Không được quá 100 ký tự.</span>
                        <span *ngIf="addTitleRef.errors?.['pattern']">Tên tiêu đề không được chỉ chứa khoảng
                            trắng.</span>
                    </small>
                </div>

                <div class="flex gap-4">
                    <div *ngIf="selectedReportId" class="flex flex-col grow gap-2">
                        <label class="block font-semibold"> Người tạo </label>
                        <input disabled pInputText [(ngModel)]="addAuthor"
                            class="w-full p-2 border border-gray-300 rounded" />
                    </div>

                    <div class="flex flex-col grow gap-2">
                        <label class="block font-semibold ">Ngày <span class="text-red-500">*</span></label>
                        <p-datepicker [(ngModel)]="addDate" dateFormat="dd/mm/yy" [showIcon]="true" class="w-full"
                            placeholder="Vui lòng chọn ngày" appendTo="body" [minDate]="minCompletionDate"
                            [maxDate]="maxCompletionDate"></p-datepicker>
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="block font-semibold ">File đính kèm</label>
                    <div class="flex flex-col gap-2">
                        <p-fileupload (onSelect)="onFileSelect($event)" [showUploadButton]="false" [multiple]="false"
                            accept=".pdf, .docx" maxFileSize="5000000" mode="advanced">
                            <ng-template #empty>
                                <div>Kéo thả file để đăng tải.</div>
                            </ng-template>
                            <ng-template #content>
                                <ul *ngIf="uploadedFiles.length">
                                    <li *ngFor="let file of uploadedFiles">{{ file.name }} - {{ file.size }} bytes</li>
                                </ul>
                            </ng-template>
                        </p-fileupload>
                    </div>
                    <div *ngIf="file && selectedReportId" class="flex items-center gap-4">
                        <p-button icon="pi pi-file" label="Xem file đính kèm" (click)="viewFile(file)" outlined>
                        </p-button>
                        <p-button icon="pi pi-download" text (click)="downloadFile(file)">
                        </p-button>
                    </div>
                </div>
            </div>
        </section>
    </ng-template>
    <!-- Dialog Footer -->
    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-4 p-2">
            <button pButton type="button" label="Hủy" class="p-button-text text-gray-500 hover:text-gray-700"
                (click)="closeDialog()"></button>
            <button pButton type="button" label="Lưu" (click)="saveReport()"></button>
        </div>
    </ng-template>
</p-dialog>

<p-toast></p-toast>
<div *ngIf="isLoading" class="overlay-spinner">
    <p-progressSpinner></p-progressSpinner>
</div>
