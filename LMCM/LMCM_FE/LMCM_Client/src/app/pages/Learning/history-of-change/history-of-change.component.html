<p-card>
    <div class="flex justify-between items-center">
      <h2 class="text-xl font-bold text-orange-500">Lịch sử thay đổi</h2>
      <p-button label="Nhập" icon="pi pi-upload" class="p-button-warning"></p-button>
    </div>
  
    <div class="mt-3">
      <p-inputGroup class="w-full">
        <p-button label="Tìm kiếm" (click)="loadHistory()" />
        <input [(ngModel)]="searchKey" pInputText placeholder="Từ khóa" />
      </p-inputGroup>
    </div>
  
    <div class="mt-4">
      <p-table [value]="historyList" [rows]="pageSize" [paginator]="true" [totalRecords]="totalCount" 
               (onPage)="paginate($event)" class="w-full">
        <ng-template pTemplate="header">
          <tr>
            <th>Mã môn</th>
            <th>Tên môn</th>
            <th>Loại thay đổi</th>
            <th>Ngày hoàn thành</th>
            <th>Kỳ bắt đầu áp dụng</th>
            <th>Hành động</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
          <tr>
            <td>{{ item.courseCode }}</td>
            <td>{{ item.learningMaterialType }}</td>
            <td>{{ item.changeType }}</td>
            <td>{{ item.completionDate | date:'dd/MM/yyyy' }}</td>
            <td>{{ item.startTerm }}</td>
            <td>
              <p-button label="Edit" class="p-button-text p-button-sm p-button-warning" (click)="editItem(item)"></p-button>
              <p-button label="Xóa" class="p-button-text p-button-sm p-button-danger" (click)="confirmDelete(item)"></p-button>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  
    <p-confirmDialog></p-confirmDialog>
  </p-card>
