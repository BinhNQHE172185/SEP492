<p-card class="p-4 shadow-lg rounded-lg">
    <div class="flex justify-between items-center">
      <h2 class="text-xl font-bold text-orange-500">Danh sách Syllabus</h2>
      <p-button label="Nhập" icon="pi pi-upload" class="p-button-warning"></p-button>
    </div>
  
    <div class="mt-3">
      <p-inputgroup class="w-full">
        <p-button icon="pi pi-search"></p-button>
        <input [(ngModel)]="searchText" pInputText placeholder="Keyword" />
      </p-inputgroup>
    </div>
  
    <div class="mt-4">
      <p-table [value]="filteredSyllabus()" [paginator]="true" [rows]="4" class="w-full">
        <ng-template pTemplate="header">
          <tr class="text-orange-400">
            <th>Syllabus ID</th>
            <th>Subject Code</th>
            <th>Subject Name</th>
            <th>Syllabus Name</th>
            <th>IsActive</th>
            <th>IsApproved</th>
            <th>DecisionNo</th>
            <th>Hành động</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
          <tr>
            <td>{{ item.syllabusId }}</td>
            <td>{{ item.subjectCode }}</td>
            <td>{{ item.subjectName }}</td>
            <td>{{ item.syllabusName }}</td>
            <td>
              <span [ngClass]="item.isActive ? 'status-yes' : 'status-no'">
                {{ item.isActive ? 'Yes' : 'No' }}
              </span>
            </td>
            <td>
              <span [ngClass]="item.isApproved ? 'status-yes' : 'status-no'">
                {{ item.isApproved ? 'Yes' : 'No' }}
              </span>
            </td>
            <td>{{ item.decisionNo }}</td>
            <td>
              <p-button label="Xóa" icon="pi pi-trash" class="p-button-text p-button-sm p-button-danger"
                        (click)="confirmDelete(item.syllabusId)"></p-button>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  
    <p-confirmDialog></p-confirmDialog>
  </p-card>
