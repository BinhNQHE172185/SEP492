<p-card>
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-orange-500">Lịch sử thay đổi</h2>
        <p-button label="Thêm" class="p-button-warning" (click)="openAddDialog()"></p-button>
    </div>

    <div class="mt-3">
        <p-inputGroup class="w-full">
            <p-button label="Tìm kiếm" (click)="loadHistory()" />
            <input [(ngModel)]="searchKey" pInputText placeholder="Từ khóa" />
        </p-inputGroup>
    </div>

    <div class="mt-4">
        <p-table
            [value]="historyList"
            [rows]="pageSize"
            [paginator]="true"
            [totalRecords]="totalCount"
            [lazy]="true"
            (onPage)="loadHistory($event)"
            currentPageReportTemplate="Hiển thị {first} - {last} của {totalRecords} bản ghi"
            [showCurrentPageReport]="true"
            [rowsPerPageOptions]="[10, 20, 30]"
            [first]="(pageIndex - 1) * pageSize"
            class="w-full"
            *ngIf="historyList && historyList.length > 0; else noDataTemplate"
        >
            <ng-template pTemplate="header">
                <tr>
                    <th>Mã môn</th>
                    <th>Loại tài liệu</th>
                    <th>Loại thay đổi</th>
                    <th>Ngày hoàn thành</th>
                    <th>Kỳ bắt đầu áp dụng</th>
                    <th>Hành động</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-item>
                <tr>
                    <td>{{ item.courseCode }}</td>
                    <td>{{ item.learningMaterialType }}</td>
                    <td>{{ item.changeType }}</td>
                    <td>{{ item.completionDate | date: 'dd/MM/yyyy' }}</td>
                    <td>{{ item.startTerm }}</td>
                    <td>
                        <div style="display: flex; gap: 10px">
                            <p-button label="Chi tiết" outlined (click)="showDetail(item)"></p-button>
                            <p-button label="Sửa" outlined (click)="editDetail(item)"></p-button>
                            <p-button label="Xóa" outlined (click)="confirmDelete(item)"></p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <ng-template #noDataTemplate>
        <p class="text-center text-gray-500 mt-4">Không có dữ liệu.</p>
    </ng-template>

    <p-confirmDialog></p-confirmDialog>
    <p-dialog [(visible)]="displayDetailDialog" [modal]="true" [closable]="true"
    header="Chi tiết lịch sử thay đổi"
    [style]="{ width: '580px', height: '630px', 'border-radius': '8px' }">

    <div class="p-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <div class="mb-4">
                    <label class="font-bold text-sm">Mã môn *</label>
                    <input pInputText [(ngModel)]="selectedItem.courseCode" class="w-full"  />
                </div>

                <div class="mb-4">
                    <label class="font-bold text-sm">Ngày hoàn thành *</label>
                    <p-calendar [(ngModel)]="selectedItem.completionDate" dateFormat="dd-mm-yy" showIcon="true" class="w-full" ></p-calendar>
                </div>

                <div class="mb-4">
                    <label class="font-bold text-sm">Kỳ bắt đầu áp dụng *</label>
                    <p-calendar [(ngModel)]="selectedItem.startTerm" dateFormat="yy-mm" showIcon="true" class="w-full" ></p-calendar>
                </div>
            </div>

            <div>
                <div class="mb-4">
                    <label class="font-bold text-sm">Số hợp đồng</label>
                    <input pInputText [(ngModel)]="selectedItem.contractNumber" class="w-full"  />
                </div>

                <div class="mb-4">
                    <label class="font-bold text-sm">Loại thay đổi *</label>
                    <input pInputText [(ngModel)]="selectedItem.changeType" class="w-full"  />
                </div>

                <div class="mb-4">
                    <label class="font-bold text-sm">Loại học liệu *</label>
                    <input pInputText [(ngModel)]="selectedItem.learningMaterialType" class="w-full"  />
                </div>
            </div>
            <div class="col-span-2">
                <label class="font-bold text-sm">Nội dung thay đổi *</label>
                <textarea pInputTextarea [(ngModel)]="selectedItem.changeDescription" rows="8" autoResize="true"
                    class="w-full p-2 rounded-md border" ></textarea>
            </div>
        </div>
    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-2">
            <p-button label="Đóng" (click)="displayDetailDialog = false" severity="secondary"></p-button>
        </div>
    </ng-template>
</p-dialog>

<p-dialog [(visible)]="displayEditDialog" [modal]="true" [closable]="true"
header="Chỉnh sửa thông tin thay đổi"
[style]="{ width: '580px', height: '630px', 'border-radius': '8px' }">

<div class="p-4">
    <div class="grid grid-cols-2 gap-4">
        <div>
            <div class="mb-4">
                <label class="font-bold text-sm">Mã môn *</label>
                <input pInputText [(ngModel)]="editHistory.courseCode" class="w-full" />
            </div>

            <div class="mb-4">
                <label class="font-bold text-sm">Ngày hoàn thành *</label>
                <p-calendar [(ngModel)]="editHistory.completionDate" dateFormat="dd-mm-yy" showIcon="true" class="w-full"></p-calendar>
            </div>

            <div class="mb-4">
                <label class="font-bold text-sm">Kỳ bắt đầu áp dụng *</label>
                <p-calendar [(ngModel)]="editHistory.startTerm" dateFormat="yy-mm" showIcon="true" class="w-full"></p-calendar>
            </div>
        </div>

        <div>
            <div class="mb-4">
                <label class="font-bold text-sm">Số hợp đồng</label>
                <input pInputText [(ngModel)]="editHistory.contractNumber" class="w-full" />
            </div>

            <div class="mb-4">
                <label class="font-bold text-sm">Loại thay đổi *</label>
                <input pInputText [(ngModel)]="editHistory.changeType" class="w-full" />
            </div>

            <div class="mb-4">
                <label class="font-bold text-sm">Loại học liệu *</label>
                <input pInputText [(ngModel)]="editHistory.learningMaterialType" class="w-full" />
            </div>
        </div>

        <div class="col-span-2">
            <label class="font-bold text-sm">Nội dung thay đổi *</label>
            <textarea pInputTextarea [(ngModel)]="editHistory.changeDescription" rows="8" autoResize="true"
                class="w-full p-2 rounded-md border"></textarea>
        </div>
    </div>
</div>

<ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
        <p-button label="Hủy" (click)="displayEditDialog = false" severity="secondary"></p-button>
        <p-button label="Lưu" (click)="updateHistory()" severity="warn"></p-button>
    </div>
</ng-template>
</p-dialog>

<p-dialog [(visible)]="displayAddDialog" [modal]="true" [closable]="true"
header="Thêm mới thông tin thay đổi"
[style]="{ width: '580px', height: '630px', 'border-radius': '8px' }">

<div class="p-4">
    <div class="grid grid-cols-2 gap-4">
        <div>
            <div class="mb-4">
                <label class="font-bold text-sm">Mã môn *</label>
                <input pInputText [(ngModel)]="newHistory.courseCode" class="w-full" placeholder="Nhập mã môn" />
            </div>

            <div class="mb-4">
                <label class="font-bold text-sm">Ngày hoàn thành *</label>
                <p-calendar [(ngModel)]="newHistory.completionDate" dateFormat="dd-mm-yy" showIcon="true" class="w-full"></p-calendar>
            </div>

            <div class="mb-4">
                <label class="font-bold text-sm">Kỳ bắt đầu áp dụng *</label>
                <p-calendar [(ngModel)]="newHistory.startTerm" dateFormat="yy-mm" showIcon="true" class="w-full"></p-calendar>
            </div>
        </div>

        <div>
            <div class="mb-4">
                <label class="font-bold text-sm">Số hợp đồng</label>
                <input pInputText [(ngModel)]="newHistory.contractNumber" class="w-full" placeholder="Nhập số hợp đồng" />
            </div>

            <div class="mb-4">
                <label class="font-bold text-sm">Loại thay đổi *</label>
                <input pInputText [(ngModel)]="newHistory.changeType" class="w-full" />
            </div>

            <div class="mb-4">
                <label class="font-bold text-sm">Loại học liệu *</label>
                <input pInputText [(ngModel)]="newHistory.learningMaterialType" class="w-full" />
            </div>
        </div>

        <div class="col-span-2">
            <label class="font-bold text-sm">Nội dung thay đổi *</label>
            <textarea pInputTextarea [(ngModel)]="newHistory.changeDescription" rows="8" autoResize="true"
                class="w-full p-2 rounded-md border"></textarea>
        </div>
    </div>
</div>

<ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
        <p-button label="Hủy" (click)="displayAddDialog = false" severity="secondary"></p-button>
        <p-button label="Lưu" (click)="addHistory()" severity="warn"></p-button>
    </div>
</ng-template>
</p-dialog>

</p-card>
