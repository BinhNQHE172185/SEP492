<p-dialog header="Chi tiết biên bản nghiệm thu" [(visible)]="displayDetailDialog" [modal]="true"
  [style]="{ width: '1000px', minHeight: '55vh' }" [draggable]="false" [resizable]="false" class="custom-dialog" (onHide)="closeDialog()">
  <ng-template pTemplate="content">
      <section class="p-8 w-full bg-white rounded-xl" *ngIf="contract">
        <div class="flex flex-wrap gap-4">
            <div class="flex-1 min-w-[250px]">
                <label class="block mb-2">Ngày nghiệm thu</label>
                <input type="text" class="w-full p-2 border rounded" [value]="contract.acceptanceDate | date: 'dd/MM/yyyy'" readonly />
            </div>
            <div class="flex-1 min-w-[250px]">
                <label class="block mb-2">Tên biên bản</label>
                <input type="text" class="w-full p-2 border rounded" [value]="contract.title"readonly />
            </div>
        </div>
        
        <div class="flex flex-wrap gap-4 mt-4">
            <div class="flex-1 min-w-[250px]">
                <label class="block mb-2">Giá cả quyết toán</label>
                <input type="text" class="w-full p-2 border rounded" [value]="contract.finalPrice | currency:'VND'" readonly />
            </div>
            <div class="flex-1 min-w-[250px]">
                <label class="block mb-2">Người kiểm tra</label>
                <input type="text" class="w-full p-2 border rounded" [value]="contract.author.name" readonly />
            </div>
        </div>
        
        <div class="flex flex-wrap gap-4 mt-4">
            <div class="flex-1 min-w-[250px]">
                <label class="block mb-2">Ngày tạo</label>
                <input type="text" class="w-full p-2 border rounded" [value]="contract.createdAt | date: 'dd/MM/yyyy'" readonly />
            </div>
            <div class="flex-1 min-w-[250px]">
                <label class="block mb-2">Ngày sửa đổi</label>
                <input type="text" class="w-full p-2 border rounded" [value]="contract.updatedAt | date: 'dd/MM/yyyy'"readonly />
            </div>
        </div>
       
        
        <div class="flex flex-col gap-2 mt-4">
            <label class="block font-semibold text-orange-500">File đính kèm</label>
            <div *ngIf="contract.url; else noFile" class="flex items-center gap-2">
                <p-button (click)="downloadFile(contract.url)" outlined>
                    <i class="pi pi-download"></i> Tải file đính kèm
                </p-button>
            </div>
            <ng-template #noFile>
                <p class="text-gray-500 italic">Không có file đính kèm</p>
            </ng-template>
        </div>
        
        
      </section>
  </ng-template>

  <ng-template pTemplate="footer">
      <div class="flex justify-end gap-4 p-2">
          <p-button label="Đóng" class="p-button-text" (click)="closeDialog()"></p-button>
      </div>
  </ng-template>
</p-dialog>
