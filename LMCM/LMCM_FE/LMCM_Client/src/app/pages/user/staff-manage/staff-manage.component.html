<p-card class="p-4 shadow-lg rounded-lg">
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-orange-500">Quản lý nhân sự</h2>
        <p-button label="Thêm" icon="pi pi-plus" (onClick)="openNew()"></p-button>
    </div>

    <div class="mt-3">
        <p-inputgroup class="w-full">
            <p-button label="Search" />
            <input pInputText placeholder="Keyword" />
        </p-inputgroup>
    </div>

    <div class="mt-3">
        <p-table #dt [value]="staffList" [rows]="10" [columns]="cols" [paginator]="true"
            [globalFilterFields]="['name', 'status', 'email']" [rowHover]="true" dataKey="id"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} staff" [showCurrentPageReport]="true"
            [rowsPerPageOptions]="[10, 20, 30]">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="name" style="width: 30%;">
                        Tên
                        <p-sortIcon field="name" />
                    </th>
                    <th style="width: 20%;" class="text-center">Trạng thái</th>
                    <th style="width: 30%;">Email</th>
                    <th style="width: 20%;" class="text-center">Hành động</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-staff>
                <tr>
                    <td>{{ staff.name }}</td>
                    <td>
                        <p-tag [value]="staff.status" [severity]="getTagSeverity(staff.status)"></p-tag>
                    </td>
                    <td>{{ staff.email }}</td>
                    <td class="text-center">
                        <p-button icon="pi pi-pencil" class="p-button-text p-button-sm" title="Chỉnh sửa"></p-button>
                        <p-button icon="pi pi-trash" class="p-button-text p-button-sm p-button-danger"
                            title="Xóa"></p-button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</p-card>

<p-dialog [(visible)]="userDialog" [style]="{ width: '450px' }" header="Thêm nhân viên" [modal]="true">
    <div class="flex flex-col gap-6">
        <div>
            <label for="email" class="block font-bold mb-3">Email</label>
            <input type="text" pInputText id="email" class="w-full" required autofocus />
            <small class="text-red-500" *ngIf="submitted">Email is required.</small>
        </div>
    </div>

    <ng-template pTemplate="footer">
        <p-button label="Hủy" icon="pi pi-times" text (click)="hideDialog()" />
        <p-button label="Lưu" icon="pi pi-check" />
    </ng-template>
</p-dialog>
