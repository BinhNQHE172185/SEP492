<p-card class="p-4 shadow-lg rounded-lg">
    <div class="flex justify-between items-center">
      <h2 class="text-xl font-bold text-orange-500">Lịch sử thay đổi</h2>
      <p-button label="Thêm" class="p-button-warning"></p-button>
    </div>
  
    <div class="mt-3">
      <p-inputGroup class="w-full">
        <p-button label="Tìm kiếm" (click)="loadHistory()" />
        <input [(ngModel)]="searchKey" pInputText placeholder="Từ khóa" />
      </p-inputGroup>
    </div>
  
    <div class="mt-4">
      <p-table 
        [value]="historyList" 
        [rows]="pageSize" 
        [paginator]="true" 
        [totalRecords]="totalCount" 
        [lazy]="true"
        (onPage)="loadHistory($event)" 
        currentPageReportTemplate="Hiển thị {first} - {last} của {totalRecords} bản ghi"
        [showCurrentPageReport]="true" 
        [rowsPerPageOptions]="[10, 20, 30]" 
        [first]="(pageIndex - 1) * pageSize"
        class="w-full"
        *ngIf="historyList && historyList.length > 0; else noDataTemplate">
        
        <ng-template pTemplate="header">
          <tr>
            <th>Mã môn</th>
            <th>Loại tài liệu</th>
            <th>Loại thay đổi</th>
            <th>Ngày hoàn thành</th>
            <th>Kỳ bắt đầu áp dụng</th>
            <th>Hành động</th>
          </tr>
        </ng-template>
  
        <ng-template pTemplate="body" let-item>
          <tr>
            <td>{{ item.courseCode }}</td>
            <td>{{ item.learningMaterialType }}</td>
            <td>{{ item.changeType }}</td>
            <td>{{ item.completionDate | date:'dd/MM/yyyy' }}</td>
            <td>{{ item.startTerm }}</td>
            <td>
              <p-button label="Chi tiết" outlined (click)="showDetail(item)"></p-button>
              <p-button label="Xóa"(click)="confirmDelete(item)" outlined></p-button>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  
    <ng-template #noDataTemplate>
      <p class="text-center text-gray-500 mt-4">Không có dữ liệu.</p>
    </ng-template>
  
    <p-confirmDialog></p-confirmDialog>
    <p-dialog [(visible)]="displayDetailDialog" [modal]="true" header="Chỉnh sửa thông tin thay đổi" [style]="{width: '600px'}">
      <div class="p-4 border rounded-lg">
        <div class="grid grid-cols-2 gap-4">
          
          <div>
            <label class="font-bold">Mã môn *</label>
            <input pInputText [(ngModel)]="selectedItem.courseCode" class="w-full" disabled />
          </div>
    
          <div>
            <label class="font-bold">Ngày hoàn thành *</label>
            <p-calendar [(ngModel)]="selectedItem.completionDate" dateFormat="yy-mm-dd" class="w-full"></p-calendar>
          </div>
    
          <div>
            <label class="font-bold">Kỳ bắt đầu áp dụng *</label>
            <p-calendar [(ngModel)]="selectedItem.startTerm" dateFormat="yy-mm-dd" class="w-full"></p-calendar>
          </div>
    
          <div>
            <label class="font-bold">Số hợp đồng</label>
            <input pInputText [(ngModel)]="selectedItem.contractNumber" class="w-full" />
          </div>
    
          <div class="col-span-2">
            <label class="font-bold">Loại thay đổi *</label>
            <p-dropdown [options]="changeTypes" [(ngModel)]="selectedItem.changeType" placeholder="Chọn loại thay đổi" class="w-full"></p-dropdown>
          </div>
    
          <div class="col-span-2">
            <label class="font-bold">Nội dung thay đổi *</label>
            <textarea pInputTextarea [(ngModel)]="selectedItem.changeContent" rows="3" class="w-full"></textarea>
          </div>
    
        </div>
      </div>
    
      <ng-template pTemplate="footer">
        <p-button label="Lưu" icon="pi pi-save" (click)="saveDetail()" class="p-button-success"></p-button>
        <p-button label="Hủy" icon="pi pi-times" (click)="displayDetailDialog = false" class="p-button-secondary"></p-button>
      </ng-template>
    </p-dialog>
    
  </p-card>
