<p-dialog header="Chỉnh sửa tài liệu" [(visible)]="displayAddDialog" [modal]="true" [draggable]="false" [resizable]="false"
    class="custom-dialog" (onHide)="closeDialog()">
    <ng-template pTemplate="content">
        <section class="p-8 w-full bg-white rounded-xl" *ngIf="template">
            <div class="flex flex-col gap-6">
                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Tên tài liệu</label>
                    <input pInputText [(ngModel)]="template.templateName" class="w-full p-2 border border-gray-300 rounded" />
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Loại tài liệu</label>
                    <input pInputText [(ngModel)]="template.templateType" class="w-full p-2 border border-gray-300 rounded" />
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">Trạng thái</label>
                    <p-dropdown [options]="statusList" [(ngModel)]="template.status" optionLabel="label" optionValue="value" 
                        class="w-full border border-gray-300 rounded"></p-dropdown>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block font-semibold text-orange-500">File đính kèm</label>
                    <p-fileupload (onSelect)="onFileSelect($event)" [showUploadButton]="false" [multiple]="false" 
                        accept=".pdf" maxFileSize="5000000" mode="advanced">
                        <ng-template #empty>
                            <div>Kéo thả file để đăng tải.</div>
                        </ng-template>
                        <ng-template #content>
                            <ul *ngIf="uploadedFiles.length">
                                <li *ngFor="let file of uploadedFiles">{{ file.name }} - {{ file.size }} bytes</li>
                            </ul>
                        </ng-template>
                    </p-fileupload>

                    <div *ngIf="file && selectedId" class="flex items-center gap-4">
                        <p-button (click)="downloadFile(file)" outlined>
                            <i class="pi pi-download"></i> Tải file đính kèm
                        </p-button>
                        <span class="text-gray-500 text-sm">(Chọn file mới nếu muốn thay đổi)</span>
                    </div>
                </div>
            </div>
        </section>
    </ng-template>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-4 p-2">
            <p-button label="Hủy" class="p-button-text" (click)="closeDialog()"></p-button>
            <p-button label="Lưu" class="p-button-warning" (click)="save()"></p-button>
        </div>
    </ng-template>
</p-dialog>
