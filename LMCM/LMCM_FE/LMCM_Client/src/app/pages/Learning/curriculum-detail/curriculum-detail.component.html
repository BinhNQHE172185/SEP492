<!-- Header with buttons -->
<div class="section-header">
  <h2 class="text-orange-500">Chi tiết chương trình giảng dạy</h2>

  <!-- <button pButton icon="pi pi-history" label="Xem lịch sử thay đổi"[routerLink]="['/user/plo']" class="p-button-outlined"></button> -->
  <button pButton icon="pi pi-file" label="Xem PLO" (click)="viewPLO()" class="p-button-outlined"></button>
  <!-- <button pButton icon="pi pi-th-large" label="Xem Combo"[routerLink]="['/user/plo']" class="p-button-outlined"></button>
      <button pButton icon="pi pi-list" label="Xem môn TC"[routerLink]="['/user/plo']" class="p-button-outlined"></button> -->

</div>

<div class="flex flex-col md:flex-row gap-4">
  <!-- Left Column -->
  <div class="flex-1 pr-0 md:pr-4">
    <ng-template ngFor let-field [ngForOf]="[
          { label: 'Mã Chương trình', value: curriculumDetail.curriculumCode },
          { label: 'Tên chương trình', value: curriculumDetail.curriculumName },
          { label: 'English Curriculum Name', value: curriculumDetail.curriculumNameEnglish },
          { label: 'Mã chuyên ngành', value: curriculumDetail.vocationalCode }
        ]">
      <div class="field mb-5">
        <label class="block text-700 mb-2">{{ field.label }}</label>
        <input pInputText [value]="field.value" [disabled]="true" class="w-full readable-text" />
      </div>
    </ng-template>
  </div>

  <!-- Right Column -->
  <div class="flex-1 pl-0 md:pl-4">
    <ng-template ngFor let-field [ngForOf]="[
          { label: 'Tên chuyên ngành', value: curriculumDetail.vocationalName },
          { label: 'English Vocational Name', value: curriculumDetail.englishVocationalName },
          { label: 'Quyết định số', value: curriculumDetail.decisionNo },
          { label: 'Ngày phê duyệt', value: (curriculumDetail.approvedDate | date: 'dd/MM/yyyy') }
        ]">
      <div class="field mb-5">
        <label class="block text-700 mb-2">{{ field.label }}</label>
        <input pInputText [value]="field.value" [disabled]="true" class="w-full readable-text" />
      </div>
    </ng-template>
  </div>
</div>

<!-- Full width description -->
<div class="w-full">
  <label class="block text-700 mb-2">Miêu tả</label>
  <textarea pTextarea [value]="curriculumDetail.curriculumDescription" [disabled]="true"
    class="w-full readable-text-area" autoResize></textarea>
</div>


<h2>Cơ cấu chương trình giảng dạy</h2>
<div class="flex flex-wrap gap-4">
  <p-card *ngFor="let semester of semesters" class="w-[32%]">
    <ng-template #header>
      <div class="flex font-bold text-lg text-orange-500 ml-4 mt-3 mb-[-10px]">
        Kỳ {{ semester.number }}
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      <p-table [value]="semester.semesterSubjects">
        <ng-template pTemplate="body" let-subject let-i="rowIndex">
          <tr>
            <td>{{ i + 1 }}</td>
            <td>{{ subject.subjectName }}</td>
            <td>
              <p-tag severity="info" [value]="subject.credit"></p-tag>
            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="3" class="text-center">Không có môn học nào.</td>
          </tr>
        </ng-template>
      </p-table>
    </ng-template>
  </p-card>
</div>
