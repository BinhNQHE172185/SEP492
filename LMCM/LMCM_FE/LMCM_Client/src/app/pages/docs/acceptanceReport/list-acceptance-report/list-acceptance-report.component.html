<p-card>
    <!-- Tiêu đề và nút Thêm mới -->
    <div class="flex justify-between items-center mb-3">
        <h2 class="text-xl font-bold text-orange-500">Danh sách biên bản nghiệm thu</h2>
        <p-button label="Thêm mới" class="p-button-warning" (click)="openAddDialog()"></p-button>
    </div>

    <!-- Ô tìm kiếm -->
    <div class="mt-3">
        <p-inputGroup class="w-full">
            <p-button label="Tìm kiếm"></p-button>
            <input [(ngModel)]="searchKey" (ngModelChange)="onSearchChange($event)" pInputText
                placeholder="Tìm kiếm biên bản..." />
        </p-inputGroup>
    </div>

    <!-- Bảng danh sách -->
    <div class="mt-4">
        <p-table [value]="report" [paginator]="true" [rows]="10" class="w-full"
            currentPageReportTemplate="Hiển thị {first} đến {last} trong tổng số {totalRecords} bản ghi"
            [showCurrentPageReport]="true" [rowsPerPageOptions]="[10, 20, 50]">
            <ng-template pTemplate="header">
                <tr>
                    <th>Ngày nghiệm thu</th>
                    <th>Tiêu đề</th>
                    <th>Giá trị quyết toán</th>
                    <th style="display: flex; justify-content: center;">Hành động</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-report let-rowIndex="rowIndex">
                <tr>
                    <td>{{ report.acceptanceDate | date: 'dd/MM/yyyy' }}</td>
                    <td>{{ report.title}}</td>
                    <td>{{ report.finalPrice | currency:'VND' }}</td>
                    <td class="p-2 flex justify-center gap-2">
                        <p-button label="Chi tiết" outlined severity="info" outlined
                            (click)="openDetailDialog(report.acceptanceId)"></p-button>
                        <p-button label="Sửa" outlined (click)="openAddDialog(report.acceptanceId)"></p-button>
                        <p-button label="Xóa" outlined severity="danger"
                            (click)="deleteContract(report.acceptanceId)"></p-button>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="4" class="text-center">Không có dữ liệu</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</p-card>

<app-acceptance-report-create-edit [displayAddDialog]="displayAddDialog" [selectedId]="selectedId!"
    (closeDialogEvent)="handleCloseDialog(!isDetail)">
</app-acceptance-report-create-edit>

<app-acceptance-report-detail [acceptanceId]="acceptanceId!" [displayDetailDialog]="displayDetailDialog"
    (closeDialogEvent)="handleCloseDialog(isDetail)" [hidden]="!displayDetailDialog">
</app-acceptance-report-detail>

<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>
